<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VetGo - Clinic & Pet Hotel Floor Plan</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0f1117;--surface:#1a1d27;--surface2:#232736;--border:#2e3348;
    --text:#e4e6f0;--text2:#9498b0;--accent:#6c5ce7;--accent2:#a29bfe;
    --green:#00b894;--orange:#fdcb6e;--red:#e17055;--blue:#74b9ff;
    --pink:#fd79a8;
  }
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw}
  #app{position:relative;width:100%;height:100%}

  /* Header */
  #header{position:fixed;top:0;left:0;right:0;height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;z-index:100;gap:10px}
  #header h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
  #header .subtitle{font-size:11px;color:var(--text2);margin-left:2px;white-space:nowrap}
  #back-btn{display:none;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s;white-space:nowrap}
  #back-btn:hover{background:var(--accent);border-color:var(--accent)}
  .header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
  .legend{display:flex;gap:10px;font-size:10px;color:var(--text2)}
  .legend-item{display:flex;align-items:center;gap:3px}
  .legend-dot{width:7px;height:7px;border-radius:50%}

  /* Search */
  #search-wrap{position:relative;display:flex;align-items:center}
  #search-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 12px 6px 32px;border-radius:8px;font-size:12px;width:180px;outline:none;transition:all .2s}
  #search-input:focus{border-color:var(--accent);width:220px;box-shadow:0 0 0 3px rgba(108,92,231,.15)}
  #search-input::placeholder{color:var(--text2)}
  #search-icon{position:absolute;left:10px;font-size:13px;color:var(--text2);pointer-events:none}
  #search-results{position:absolute;top:100%;left:0;right:0;margin-top:6px;background:var(--surface);border:1px solid var(--border);border-radius:10px;max-height:300px;overflow-y:auto;display:none;box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:200}
  .search-result{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);transition:background .15s}
  .search-result:last-child{border-bottom:none}
  .search-result:hover{background:var(--surface2)}
  .search-result.highlighted{background:rgba(108,92,231,.15);border-left:3px solid var(--accent)}
  .sr-icon{font-size:20px;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--surface2)}
  .sr-info{flex:1;min-width:0}
  .sr-name{font-size:13px;font-weight:600}
  .sr-detail{font-size:10px;color:var(--text2);margin-top:1px}
  .sr-badge{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600;white-space:nowrap}

  /* Filter bar */
  #filter-bar{position:fixed;top:56px;left:0;right:0;height:40px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:8px;z-index:95;transition:opacity .3s}
  #filter-bar.hidden{opacity:0;pointer-events:none;height:0;overflow:hidden}
  .filter-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:20px;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:4px}
  .filter-btn:hover{border-color:var(--accent2);color:var(--text)}
  .filter-btn.active{background:rgba(108,92,231,.2);border-color:var(--accent);color:var(--accent2)}
  .filter-sep{width:1px;height:20px;background:var(--border)}

  /* Main canvas area */
  #canvas2d{position:absolute;top:96px;left:0;width:100%;height:calc(100% - 96px);cursor:pointer}

  /* 3D Container */
  #view3d{position:absolute;top:96px;left:0;width:100%;height:calc(100% - 96px);display:none;opacity:0;transition:opacity .4s}
  #view3d canvas{width:100%!important;height:100%!important}

  /* Floor Selector */
  #floor-selector{position:fixed;left:14px;top:50%;transform:translateY(-50%);z-index:90;display:flex;flex-direction:column-reverse;gap:3px;transition:opacity .3s}
  #floor-selector.hidden{opacity:0;pointer-events:none}
  .floor-btn{
    width:60px;height:56px;border:2px solid var(--border);background:var(--surface);
    border-radius:10px;cursor:pointer;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:1px;transition:all .25s;position:relative;
    color:var(--text2);
  }
  .floor-btn:hover{border-color:var(--accent2);background:var(--surface2);transform:scale(1.05)}
  .floor-btn.active{border-color:var(--accent);background:rgba(108,92,231,.15);color:var(--text);box-shadow:0 0 20px rgba(108,92,231,.3)}
  .floor-btn .floor-num{font-size:16px;font-weight:700;line-height:1}
  .floor-btn .floor-label{font-size:7px;text-transform:uppercase;letter-spacing:.3px;opacity:.7}
  .floor-btn .floor-pets{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;background:var(--red);border-radius:9px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff;border:2px solid var(--bg);padding:0 3px}
  .floor-btn .floor-pets.empty{display:none}
  .elevator-connector{width:2px;height:8px;background:var(--border);margin:0 auto}

  /* Minimap (stacked 3-floor overview) */
  #minimap{display:none;position:fixed;right:14px;top:104px;width:190px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px;z-index:90;transition:opacity .3s,transform .3s}
  #minimap.hidden{opacity:0;pointer-events:none;transform:translateX(10px)}
  #minimap h3{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:4px}
  .minimap-floor{margin-bottom:6px;cursor:pointer;border-radius:6px;padding:4px;transition:background .15s}
  .minimap-floor:hover{background:var(--surface2)}
  .minimap-floor.active{background:rgba(108,92,231,.1)}
  .minimap-floor-label{font-size:9px;color:var(--text2);margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
  .minimap-floor-label .mf-pets{font-size:8px;background:var(--surface2);padding:1px 5px;border-radius:4px;color:var(--accent2)}
  .minimap-canvas{width:100%;height:40px;border-radius:4px;background:rgba(0,0,0,.2)}

  /* Stats bar */
  #stats-bar{position:fixed;bottom:0;left:0;right:0;height:48px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:24px;z-index:90;transition:opacity .3s,transform .3s}
  #stats-bar.hidden{opacity:0;transform:translateY(10px);pointer-events:none}
  .stat-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
  .stat-item .stat-num{font-size:18px;font-weight:700;color:var(--text)}
  .stat-item .stat-icon{font-size:16px}
  .stat-divider{width:1px;height:24px;background:var(--border)}

  /* Room Info Panel */
  #info-panel{position:fixed;right:-360px;top:56px;width:340px;height:calc(100% - 56px);background:var(--surface);border-left:1px solid var(--border);padding:20px;transition:right .35s cubic-bezier(.4,0,.2,1);z-index:91;overflow-y:auto}
  #info-panel.open{right:0}
  .panel-room-name{font-size:20px;font-weight:700;margin-bottom:2px}
  .panel-room-sub{color:var(--text2);font-size:12px;margin-bottom:8px}
  .panel-room-status{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;margin-bottom:12px}
  .status-available{background:rgba(0,184,148,.15);color:var(--green)}
  .status-occupied{background:rgba(225,112,85,.15);color:var(--red)}
  .status-cleaning{background:rgba(253,203,110,.15);color:var(--orange)}
  .panel-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
  .panel-section h3{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  .pet-card{background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:8px;position:relative}
  .pet-card .name{font-weight:600;font-size:14px}
  .pet-card .breed{font-size:12px;color:var(--text2)}
  .pet-card .date{font-size:11px;color:var(--accent2);margin-top:3px}
  .pet-card .pet-timer{position:absolute;right:12px;top:12px;font-size:10px;color:var(--orange);background:rgba(253,203,110,.1);padding:2px 8px;border-radius:6px}
  .furniture-list{display:flex;flex-wrap:wrap;gap:5px}
  .furniture-tag{background:var(--surface2);padding:3px 9px;border-radius:6px;font-size:11px;color:var(--text2)}

  /* Tooltip */
  #tooltip{position:fixed;pointer-events:none;background:var(--surface);border:1px solid var(--border);padding:8px 14px;border-radius:8px;font-size:12px;z-index:200;display:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}

  /* Capacity Bar */
  .capacity-bar{margin-top:12px}
  .capacity-bar-label{font-size:11px;color:var(--text2);margin-bottom:4px;display:flex;justify-content:space-between}
  .capacity-bar-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
  .capacity-bar-fill{height:100%;border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}

  /* Quick Action Buttons */
  .quick-actions{display:flex;gap:8px;margin-top:14px}
  .qa-btn{flex:1;padding:10px 8px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
  .qa-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
  .qa-btn.checkin{border-color:rgba(0,184,148,.3);background:rgba(0,184,148,.1)}
  .qa-btn.checkin:hover{background:rgba(0,184,148,.25);border-color:var(--green)}
  .qa-btn.checkout{border-color:rgba(225,112,85,.3);background:rgba(225,112,85,.1)}
  .qa-btn.checkout:hover{background:rgba(225,112,85,.25);border-color:var(--red)}
  .qa-btn.clean{border-color:rgba(253,203,110,.3);background:rgba(253,203,110,.1)}
  .qa-btn.clean:hover{background:rgba(253,203,110,.25);border-color:var(--orange)}
  .qa-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

  /* Notification Toasts */
  #toast-container{position:fixed;bottom:60px;right:16px;z-index:300;display:flex;flex-direction:column-reverse;gap:8px;pointer-events:none}
  .toast{pointer-events:auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:toastIn .35s cubic-bezier(.4,0,.2,1) forwards;max-width:340px;min-width:260px}
  .toast.leaving{animation:toastOut .3s cubic-bezier(.4,0,.2,1) forwards}
  .toast-icon{font-size:20px;flex-shrink:0}
  .toast-body{flex:1;min-width:0}
  .toast-title{font-size:12px;font-weight:600}
  .toast-detail{font-size:10px;color:var(--text2);margin-top:1px}
  .toast-time{font-size:9px;color:var(--text2);flex-shrink:0}
  .toast-accent{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:12px 0 0 12px}
  @keyframes toastIn{from{opacity:0;transform:translateX(40px) scale(.95)}to{opacity:1;transform:translateX(0) scale(1)}}
  @keyframes toastOut{from{opacity:1;transform:translateX(0) scale(1)}to{opacity:0;transform:translateX(40px) scale(.9)}}

  /* Clock & User */
  #clock-wrap{display:flex;align-items:center;gap:8px;margin-left:8px}
  #clock{font-size:11px;color:var(--text2);font-variant-numeric:tabular-nums;white-space:nowrap}
  #user-badge{display:flex;align-items:center;gap:5px;background:var(--surface2);padding:3px 10px 3px 4px;border-radius:20px;font-size:11px;color:var(--text2)}
  #user-badge .avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--blue));display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700}

  /* Dashboard Panel */
  #dashboard{position:fixed;right:14px;top:104px;width:190px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;z-index:89;transition:opacity .3s,transform .3s;max-height:calc(100vh - 168px);overflow-y:auto}
  #dashboard.hidden{opacity:0;pointer-events:none;transform:translateX(10px)}
  #dashboard::-webkit-scrollbar{width:3px}
  #dashboard::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  #dashboard h3{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
  .dash-donut-wrap{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .dash-donut{position:relative;width:64px;height:64px;flex-shrink:0}
  .dash-donut canvas{width:64px;height:64px}
  .dash-donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
  .dash-donut-center .num{font-size:16px;font-weight:700;line-height:1}
  .dash-donut-center .label{font-size:7px;color:var(--text2);text-transform:uppercase}
  .dash-legend{display:flex;flex-direction:column;gap:4px}
  .dash-legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}
  .dash-legend-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .dash-section{border-top:1px solid var(--border);padding-top:8px;margin-top:8px}
  .dash-section h4{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

  /* Revenue cards */
  .revenue-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
  .rev-card{background:var(--surface2);border-radius:8px;padding:8px;text-align:center;border:1px solid var(--border)}
  .rev-card .rev-label{font-size:8px;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
  .rev-card .rev-value{font-size:14px;font-weight:700;color:var(--green)}
  .rev-card .rev-value.orange{color:var(--orange)}
  .rev-card .rev-value.blue{color:var(--blue)}
  .rev-card .rev-value.pink{color:var(--pink)}
  .rev-card.full-width{grid-column:1/-1}
  .occupancy-bar-wrap{margin-top:4px}
  .occupancy-bar-track{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
  .occupancy-bar-fill{height:100%;border-radius:3px;transition:width .5s}

  /* Upcoming bookings */
  .booking-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(46,51,72,.5)}
  .booking-item:last-child{border-bottom:none}
  .booking-icon{font-size:16px;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--surface2);flex-shrink:0}
  .booking-info{flex:1;min-width:0}
  .booking-name{font-size:11px;font-weight:600;color:var(--text)}
  .booking-detail{font-size:9px;color:var(--text2)}
  .booking-date{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;white-space:nowrap}
  .booking-date.today{background:rgba(225,112,85,.15);color:var(--red)}
  .booking-date.tomorrow{background:rgba(253,203,110,.15);color:var(--orange)}
  .booking-date.later{background:rgba(116,185,255,.15);color:var(--blue)}

  /* Price tag in info panel */
  .panel-price{display:inline-flex;align-items:center;gap:4px;background:rgba(0,184,148,.1);color:var(--green);padding:4px 10px;border-radius:6px;font-size:13px;font-weight:700;margin:6px 0}
  .panel-price .price-unit{font-size:10px;font-weight:400;color:var(--text2)}

  /* Owner info in pet card */
  .pet-owner{font-size:10px;color:var(--text2);margin-top:2px;display:flex;align-items:center;gap:4px}
  .pet-checkout{font-size:10px;color:var(--orange);margin-top:1px}

  /* Contact buttons */
  .pet-contact{display:flex;gap:6px;margin-top:6px}
  .contact-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);text-decoration:none;transition:all .15s}
  .contact-btn:hover{transform:scale(1.03)}
  .contact-btn.call{border-color:rgba(0,184,148,.3);color:var(--green)}
  .contact-btn.call:hover{background:rgba(0,184,148,.12)}
  .contact-btn.sms{border-color:rgba(116,185,255,.3);color:var(--blue)}
  .contact-btn.sms:hover{background:rgba(116,185,255,.12)}

  /* Weekly revenue chart */
  .weekly-chart{display:flex;align-items:flex-end;gap:3px;height:50px;margin-top:6px;padding:4px 0}
  .weekly-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
  .weekly-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .5s;position:relative}
  .weekly-bar-label{font-size:7px;color:var(--text2)}
  .weekly-bar-val{font-size:7px;color:var(--text);font-weight:600;white-space:nowrap}
  .dash-alert{display:flex;align-items:center;gap:6px;font-size:10px;padding:5px 0;color:var(--text2)}
  .dash-alert .da-icon{font-size:14px;flex-shrink:0}
  .dash-alert .da-text{flex:1;line-height:1.3}
  .dash-alert .da-badge{font-size:9px;padding:1px 6px;border-radius:4px;font-weight:600;flex-shrink:0}

  /* Empty state */
  .empty-state{text-align:center;padding:24px 12px;color:var(--text2)}
  .empty-state .es-icon{font-size:40px;margin-bottom:8px;opacity:.5}
  .empty-state .es-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
  .empty-state .es-sub{font-size:11px;line-height:1.4}

  /* Highlight pulse for search */
  @keyframes roomPulse{
    0%,100%{filter:brightness(1)}
    50%{filter:brightness(1.8)}
  }

  /* Floor transition */
  #floor-transition{position:fixed;top:56px;left:0;right:0;bottom:0;z-index:85;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
  #floor-transition.active{opacity:1}
  #floor-transition .ft-content{background:var(--surface);border:1px solid var(--border);padding:12px 28px;border-radius:12px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
  #floor-transition .ft-arrow{font-size:20px;color:var(--accent2);animation:bounce .4s ease infinite alternate}
  #floor-transition .ft-text{font-size:13px;font-weight:600}
  @keyframes bounce{from{transform:translateY(2px)}to{transform:translateY(-2px)}}

  /* Transition overlay */
  #transition-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:80;pointer-events:none;opacity:0;transition:opacity .3s}

  /* Edit Mode */
  #edit-mode-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;transition:all .2s;white-space:nowrap}
  #edit-mode-btn:hover{border-color:var(--accent2);color:var(--text)}
  #edit-mode-btn.active{background:rgba(108,92,231,.2);border-color:var(--accent);color:var(--accent2);box-shadow:0 0 12px rgba(108,92,231,.2)}

  #edit-toolbar{position:fixed;top:96px;left:0;right:0;height:40px;background:var(--surface);border-bottom:2px solid var(--accent);display:flex;align-items:center;padding:0 16px;gap:8px;z-index:95;transition:opacity .3s}
  #edit-toolbar.hidden{opacity:0;pointer-events:none;height:0;overflow:hidden;border:none}
  .et-label{font-size:11px;color:var(--accent2);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
  .et-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
  .et-btn:hover{border-color:var(--accent2);color:var(--text);background:var(--surface)}
  .et-btn.save{border-color:rgba(0,184,148,.3);color:var(--green)}
  .et-btn.save:hover{background:rgba(0,184,148,.1)}
  .et-btn.danger{border-color:rgba(225,112,85,.3);color:var(--red)}
  .et-btn.danger:hover{background:rgba(225,112,85,.1)}
  .et-hint{font-size:10px;color:var(--text2);margin-left:auto;opacity:.7}

  #app.edit-active #canvas2d{top:136px;height:calc(100% - 136px)}
  #app.edit-active #filter-bar{display:none}

  /* Edit form in info panel */
  .edit-form-group{margin-bottom:10px}
  .edit-form-group label{display:block;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;font-weight:600}
  .edit-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;outline:none;transition:border-color .2s}
  .edit-input:focus{border-color:var(--accent)}
  .edit-select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;outline:none;cursor:pointer}
  .edit-color-row{display:flex;gap:8px;align-items:center}
  .edit-color-swatch{width:36px;height:32px;border:none;border-radius:6px;cursor:pointer;padding:0}
  .edit-btn-row{display:flex;gap:8px;margin-top:16px}
  .edit-btn{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
  .edit-btn:hover{transform:translateY(-1px)}
  .edit-btn.primary{background:var(--accent);color:#fff}
  .edit-btn.primary:hover{background:var(--accent2)}
  .edit-btn.danger{background:rgba(225,112,85,.15);color:var(--red);border:1px solid rgba(225,112,85,.3)}
  .edit-btn.danger:hover{background:rgba(225,112,85,.25)}
  .edit-btn.secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
  .edit-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
  .edit-panel-title{font-size:16px;font-weight:700}
  .edit-close-btn{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:4px}
  .edit-close-btn:hover{color:var(--text);background:var(--surface2)}
  .edit-grid-2col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .edit-tag-row{display:flex;gap:4px;flex-wrap:wrap}
  .edit-tag-btn{padding:4px 10px;border-radius:12px;font-size:10px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:all .15s}
  .edit-tag-btn.active{background:rgba(108,92,231,.2);border-color:var(--accent);color:var(--accent2)}

  /* Room palette (simple add) */
  .room-palette{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
  .rp-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 8px;cursor:pointer;text-align:center;transition:all .15s}
  .rp-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.2)}

  .rp-card .rp-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}

  /* Floor template modal */
  .ft-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center}

  .ft-modal h2{font-size:16px;font-weight:700;margin-bottom:16px}
  .ft-template-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all .15s}
  .ft-template-card:hover{border-color:var(--accent);background:rgba(108,92,231,.05)}

  .ft-template-card p{font-size:11px;color:var(--text2);line-height:1.4}

  .ft-template-card .ft-room-tag{font-size:9px;padding:2px 6px;border-radius:4px;background:var(--bg);color:var(--text2)}

  .wiz-floor-count{display:flex;align-items:center;gap:12px;margin:12px 0}
  .wiz-floor-count button{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .wiz-floor-count button:hover{border-color:var(--accent);background:var(--accent);color:#fff}
  .wiz-floor-count .wiz-num{font-size:28px;font-weight:700;color:var(--accent2);min-width:40px;text-align:center}
  .wiz-floor-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(46,51,72,.5)}
  .wiz-floor-row:last-child{border-bottom:none}
  .wiz-floor-icon{font-size:18px;width:32px;text-align:center;flex-shrink:0}
  .wiz-floor-label{font-size:12px;font-weight:600;min-width:60px}
  .wiz-floor-select{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:11px}
  .wiz-generate{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--blue));color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:16px;transition:all .2s}
  .wiz-generate:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,92,231,.3)}
  .wiz-preview{font-size:10px;color:var(--text2);text-align:center;margin-top:8px}

  /* Mobile */
  @media(max-width:768px){
    #info-panel{width:100%;right:-100%}
    .legend{display:none}
    #header h1{font-size:15px}
    #floor-selector{left:6px}
    .floor-btn{width:48px;height:48px}
    .floor-btn .floor-num{font-size:14px}

    #filter-bar{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .stat-item{font-size:11px}
    .stat-item .stat-num{font-size:15px}
  }
</style>

// ── Revenue Helpers ──
function formatVND(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1).replace('.0','') + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'K';
  return n.toLocaleString('vi-VN');
}
function formatVNDFull(n) { return n.toLocaleString('vi-VN') + 'đ'; }

function calcRevenue() {
  const today = new Date().toISOString().slice(0,10);
  const rooms = allRooms();
  let dailyRevenue = 0;
  let monthlyRevenue = 0;
  let totalCapacity = 0;
  let totalOccupied = 0;
  const upcomingCheckouts = [];

  rooms.forEach(r => {
    const cap = getRoomCapacity(r);
    if(cap > 0) { totalCapacity += cap; totalOccupied += r.pets.length; }

    r.pets.forEach(p => {
      const price = r.price || 0;
      const checkinDate = new Date(p.checkin);
      const days = Math.max(1, Math.floor((Date.now() - checkinDate.getTime()) / 86400000));

      // Daily revenue: price per pet per day (for pets currently in)
      dailyRevenue += price;
      // Monthly: accumulate days stayed × price
      monthlyRevenue += price * days;

      // Upcoming checkouts
      if(p.checkout) {
        const coDate = new Date(p.checkout);
        const diffDays = Math.round((coDate - new Date(today)) / 86400000);
        if(diffDays >= 0 && diffDays <= 3) {
          upcomingCheckouts.push({
            name: p.name,
            breed: p.breed,
            type: p.type,
            room: r.name,
            roomId: r.id,
            floorIdx: r.floorIdx,
            checkout: p.checkout,
            owner: p.owner || '',
            phone: p.phone || '',
            diffDays: diffDays,
            price: price
          });
        }
      }
    });
  });

  upcomingCheckouts.sort((a,b) => a.diffDays - b.diffDays);
  const occupancyRate = totalCapacity > 0 ? (totalOccupied / totalCapacity * 100) : 0;

  return { dailyRevenue, monthlyRevenue, occupancyRate, totalCapacity, totalOccupied, upcomingCheckouts };
}

function getWeeklyRevenue() {
  const today = new Date();
  const dayNames = ['CN','T2','T3','T4','T5','T6','T7'];
  const week = [];
  const rev = calcRevenue();
  const dailyBase = rev.dailyRevenue;
  for(let i=6; i>=0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate()-i);
    const dayIdx = d.getDay();
    // Simulate variation: weekends higher, some random variation
    const variation = i === 0 ? 1 : (0.6 + Math.sin(i*1.7)*0.3 + (dayIdx===0||dayIdx===6 ? 0.2 : 0));
    const amount = Math.round(dailyBase * variation);
    week.push({
      label: dayNames[dayIdx],
      value: amount,
      isToday: i === 0,
      date: d.toISOString().slice(5,10)
    });
  }
  return week;
}

function getCheckoutBadge(room) {
  const today = new Date().toISOString().slice(0,10);
  let soonest = Infinity;
  room.pets.forEach(p => {
    if(!p.checkout) return;
    const diff = Math.round((new Date(p.checkout) - new Date(today)) / 86400000);
    if(diff >= 0 && diff < soonest) soonest = diff;
  });
  if(soonest === 0) return {text:'HÔM NAY', color:'#e17055', bg:'rgba(225,112,85,.85)'};
  if(soonest === 1) return {text:'NGÀY MAI', color:'#fdcb6e', bg:'rgba(253,203,110,.85)'};
  if(soonest <= 3) return {text:soonest+'D', color:'#74b9ff', bg:'rgba(116,185,255,.7)'};
  return null;
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { searchResults.style.display = 'none'; highlightedRoomId = null; return; }

  const results = [];

  // Search pets
  allPets().forEach(p => {
    if (p.name.toLowerCase().includes(q) || p.breed.toLowerCase().includes(q)) {
      results.push({ type:'pet', icon:p.type==='cat'?'\u{1F431}':p.type==='exotic'?'\u{1F98E}':'\u{1F436}',
        name:p.name, detail:`${p.breed} \u00B7 ${p.room} \u00B7 ${p.floorName}`,
        floorIdx:p.floorIdx, roomId:p.roomId, petType:p.type });
    }
  });

  // Search rooms
  allRooms().forEach(r => {
    if (r.name.toLowerCase().includes(q) || r.nameEn.toLowerCase().includes(q)) {
      results.push({ type:'room', icon:'\u{1F6AA}',
        name:r.name, detail:`${r.nameEn} \u00B7 ${r.floorName}`,
        floorIdx:r.floorIdx, roomId:r.id, status:r.status });
    }
  });

  if (results.length === 0) {
    searchResults.innerHTML = '<div style="padding:14px;text-align:center;color:var(--text2);font-size:12px">Không tìm thấy kết quả</div>';
  } else {
    searchResults.innerHTML = results.slice(0, 8).map(r => {
      const statusColors = {available:'var(--green)',occupied:'var(--red)',cleaning:'var(--orange)'};
      const badge = r.status ? `<span class="sr-badge" style="background:${statusColors[r.status]}20;color:${statusColors[r.status]}">${r.status}</span>` : '';
      return `<div class="search-result" data-floor="${r.floorIdx}" data-room="${r.roomId}">
        <div class="sr-icon">${r.icon}</div>
        <div class="sr-info"><div class="sr-name">${r.name}</div><div class="sr-detail">${r.detail}</div></div>
        ${badge}
      </div>`;
    }).join('');
  }
  searchResults.style.display = 'block';
});

searchResults.addEventListener('click', e => {
  const item = e.target.closest('.search-result');
  if (!item) return;
  const fi = parseInt(item.dataset.floor);
  const rid = item.dataset.room;

  searchResults.style.display = 'none';
  searchInput.value = '';

  // Navigate to floor and highlight room
  highlightedRoomId = rid;
  highlightPulseTime = performance.now();
  if (fi !== currentFloor) {
    switchFloor(fi, () => { /* room will be highlighted in draw loop */ });
  }
  // Auto-clear highlight after 3s
  setTimeout(() => { highlightedRoomId = null; }, 3000);
});

searchInput.addEventListener('blur', () => { setTimeout(() => searchResults.style.display = 'none', 200); });
searchInput.addEventListener('keydown', e => { if(e.key==='Escape'){searchInput.value='';searchResults.style.display='none';highlightedRoomId=null;} });

    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
  });
});

function isRoomVisible(room) {
  if (activeFilter === 'all') return true;
  if (['available','occupied','cleaning'].includes(activeFilter)) return room.status === activeFilter;
  if (['dog','cat','exotic','medical'].includes(activeFilter)) return room.tags && room.tags.includes(activeFilter);
  return true;
}

function buildFloorSelector() {
  floorSelectorEl.innerHTML = '';
  floors.forEach((floor, idx) => {
    if (idx > 0) {
      const conn = document.createElement('div');
      conn.className = 'elevator-connector';
      floorSelectorEl.appendChild(conn);
    }
    const btn = document.createElement('button');
    btn.className = 'floor-btn' + (idx === currentFloor ? ' active' : '');
    btn.dataset.floor = idx;
    const totalPets = floor.rooms.reduce((s,r) => s + r.pets.length, 0);
    btn.innerHTML = `
      <span class="floor-num">${floor.icon} ${floor.id}</span>
      <span class="floor-label">${floor.nameEn}</span>
      <span class="floor-pets ${totalPets===0?'empty':''}">${totalPets}</span>
    `;
    btn.addEventListener('click', () => switchFloor(idx));
    floorSelectorEl.appendChild(btn);
  });
}

function updateFloorSelector() {
  floorSelectorEl.querySelectorAll('.floor-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.floor) === currentFloor);
  });
}

// ── MINIMAP (Stacked 3-floor) ──
// ══════════════════════════════════
function buildMinimap() {
  // Build into both old minimap container AND dashboard
  const targets = [minimapFloorsEl, document.getElementById('dashboard-minimaps')].filter(Boolean);
  targets.forEach(container => {
    container.innerHTML = '';
    [...floors].reverse().forEach((floor, revIdx) => {
      const idx = floors.length - 1 - revIdx;
      const div = document.createElement('div');
      div.className = 'minimap-floor' + (idx === currentFloor ? ' active' : '');
      div.dataset.floor = idx;
      const totalPets = floor.rooms.reduce((s,r) => s + r.pets.length, 0);
      div.innerHTML = `
        <div class="minimap-floor-label">
          <span>${floor.icon} ${floor.name}</span>
          <span class="mf-pets">${totalPets} \u{1F43E}</span>
        </div>
        <canvas class="minimap-canvas" data-floor="${idx}"></canvas>
      `;
      div.addEventListener('click', () => switchFloor(idx));
      container.appendChild(div);
    });
  });
  drawAllMinimaps();
}

function drawAllMinimaps() {
  document.querySelectorAll('.minimap-canvas').forEach(mc => {
    const fi = parseInt(mc.dataset.floor);
    const floor = floors[fi];
    const w = mc.clientWidth || 160;
    const h = 40;
    mc.width = w * 1.5; mc.height = h * 1.5;
    mc.style.width = w + 'px'; mc.style.height = h + 'px';
    const c = mc.getContext('2d');
    c.setTransform(1.5, 0, 0, 1.5, 0, 0);
    c.clearRect(0, 0, w, h);

    const tw = 14, th = 7;
    const ox = w / 2, oy = 6;
    function proj(gx,gy){ return { x: (gx-gy)*tw/2+ox, y: (gx+gy)*th/2+oy }; }

    floor.rooms.forEach(room => {
      const tl = proj(room.gridX, room.gridY);
      const tr = proj(room.gridX+room.gridW, room.gridY);
      const br = proj(room.gridX+room.gridW, room.gridY+room.gridH);
      const bl = proj(room.gridX, room.gridY+room.gridH);
      c.beginPath();
      c.moveTo(tl.x,tl.y); c.lineTo(tr.x,tr.y); c.lineTo(br.x,br.y); c.lineTo(bl.x,bl.y);
      c.closePath();
      const statusColors = {available:'#00b894',occupied:'#e17055',cleaning:'#fdcb6e'};
      c.fillStyle = isRoomVisible(room) ? (room.color + 'cc') : (room.color + '33');
      c.fill();
      c.strokeStyle = 'rgba(255,255,255,0.15)';
      c.lineWidth = 0.5;
      c.stroke();
      // Mini status dot
      const cx = (tl.x+br.x)/2, cy = (tl.y+br.y)/2;
      c.beginPath();
      c.arc(cx, cy, 2, 0, Math.PI*2);
      c.fillStyle = statusColors[room.status];
      c.fill();
    });
  });
}

function updateMinimapActive() {
  document.querySelectorAll('.minimap-floor').forEach(mf => {
    mf.classList.toggle('active', parseInt(mf.dataset.floor) === currentFloor);
  });
}

// ── FLOOR TRANSITION ──
// ══════════════════════════════════
function switchFloor(newIdx, cb) {
  if (newIdx === currentFloor || floorTransitioning || currentView !== '2d') return;

  // In stacked view: instant switch (no animation needed, floors are all visible)
  if (stackedView && !editMode) {
    currentFloor = newIdx;
    updateFloorSelector();
    updateMinimapActive();
    hoveredRoom = null;
    if (cb) cb();
    return;
  }

  floorTransitioning = true;
  const goingUp = newIdx > currentFloor;
  ftArrow.textContent = goingUp ? '\u25B2' : '\u25BC';
  ftText.textContent = `${goingUp?'\u2B06':'\u2B07'} ${floors[newIdx].name}...`;
  floorTransEl.classList.add('active');

  canvas.style.transition = 'transform .3s cubic-bezier(.4,0,.2,1), opacity .2s';
  canvas.style.transform = goingUp ? 'translateY(-30px)' : 'translateY(30px)';
  canvas.style.opacity = '0';

  setTimeout(() => {
    currentFloor = newIdx;
    updateFloorSelector();
    updateMinimapActive();
    hoveredRoom = null;

    canvas.style.transition = 'none';
    canvas.style.transform = goingUp ? 'translateY(30px)' : 'translateY(-30px)';
    requestAnimationFrame(() => {
      canvas.style.transition = 'transform .3s cubic-bezier(.4,0,.2,1), opacity .2s';
      canvas.style.transform = 'translateY(0)';
      canvas.style.opacity = '1';
      setTimeout(() => {
        floorTransEl.classList.remove('active');
        canvas.style.transition = '';
        canvas.style.transform = '';
        floorTransitioning = false;
        if (cb) cb();
      }, 350);
    });
  }, 300);
}

// ══════════════════════════════════
// ── 2D CANVAS ──
// ══════════════════════════════════
const TILE_W = 100, TILE_H = 50;
let offsetX = 0, offsetY = 0;
let zoomLevel = 1.0;
let panX = 0, panY = 0;
let isPanning = false, panStartX = 0, panStartY = 0, panStartOX = 0, panStartOY = 0;

let initialZoomSet = false;
function resize2D() {
  const dpr = Math.min(window.devicePixelRatio, 1.5);
  canvas.width = canvas.clientWidth * dpr;
  canvas.height = canvas.clientHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Auto-fit zoom on first load: fill available space
  if (!initialZoomSet) {
    const sidebarW = 220, tabsW = 80;
    const availW = canvas.clientWidth - sidebarW - tabsW - 40;
    const availH = canvas.clientHeight - 150;
    const mapIsoW = 7 * TILE_W;
    const mapIsoH = 4 * TILE_H + 30;
    const fitW = availW / mapIsoW;
    const fitH = availH / mapIsoH;
    zoomLevel = Math.min(fitW, fitH, 1.8) * 0.95; // 95% fill for bigger map
    zoomLevel = Math.max(0.6, zoomLevel);
    initialZoomSet = true;
  }

  // Center map in available space (between floor tabs and sidebar)
  const sidebarW = 220;
  const tabsW = 80;
  const centerArea = canvas.clientWidth - sidebarW - tabsW;
  offsetX = tabsW + centerArea / 2 + panX;
  offsetY = canvas.clientHeight * 0.42 + panY; // slightly above center
}

function isoProject(gx,gy){ return { x:(gx-gy)*(TILE_W*zoomLevel)/2+offsetX, y:(gx+gy)*(TILE_H*zoomLevel)/2+offsetY }; }

// ── Zoom (mouse wheel) ──
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.08 : 0.08;
  const oldZoom = zoomLevel;
  zoomLevel = Math.min(1.8, Math.max(0.6, zoomLevel + delta));
  // Zoom towards mouse position
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  panX += (mx - offsetX) * (1 - zoomLevel / oldZoom);
  panY += (my - offsetY) * (1 - zoomLevel / oldZoom);
  resize2D();
}, { passive: false });

// ── Pan (left-click drag to move) ──
let panDragMoved = false;
canvas.addEventListener('mousedown', (e) => {
  if (e.button === 0 || e.button === 1) {
    isPanning = true;
    panDragMoved = false;
    panStartX = e.clientX;
    panStartY = e.clientY;
    panStartOX = panX;
    panStartOY = panY;
  }
});

window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  const dx = e.clientX - panStartX;
  const dy = e.clientY - panStartY;
  if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
    panDragMoved = true;
    canvas.style.cursor = 'grabbing';
  }
  panX = panStartOX + dx;
  panY = panStartOY + dy;
  resize2D();
});

window.addEventListener('mouseup', (e) => {
  if (isPanning) {
    isPanning = false;
    canvas.style.cursor = 'pointer';
  }
});

// Prevent context menu on canvas for right-click pan
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

function shadeColor(hex, pct) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,Math.max(0,r+pct)); g=Math.min(255,Math.max(0,g+pct)); b=Math.min(255,Math.max(0,b+pct));
  return `rgb(${r},${g},${b})`;
}

function pointInPoly(px,py,poly) {
  let ins=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i].x,yi=poly[i].y,xj=poly[j].x,yj=poly[j].y;
    if((yi>py)!==(yj>py)&&px<(xj-xi)*(py-yi)/(yj-yi)+xi) ins=!ins;
  }
  return ins;
}

// ── Cell-based Room Utilities ──
function screenToGrid(px, py) {
  const dx = px - offsetX;
  const dy = py - offsetY;
  const tw = TILE_W * zoomLevel;
  const th = TILE_H * zoomLevel;
  const gx = (dx / (tw/2) + dy / (th/2)) / 2;
  const gy = (dy / (th/2) - dx / (tw/2)) / 2;
  return { gx: Math.floor(gx), gy: Math.floor(gy) };
}

function getRoomCells(room) {
  if (room.cells && room.cells.length > 0) return room.cells;
  const cells = [];
  for (let x = room.gridX; x < room.gridX + room.gridW; x++)
    for (let y = room.gridY; y < room.gridY + room.gridH; y++)
      cells.push({x, y});
  return cells;
}

function hasNeighborCell(cells, x, y, dx, dy) {
  return cells.some(c => c.x === x+dx && c.y === y+dy);
}

function roomHasCell(room, gx, gy) {
  return getRoomCells(room).some(c => c.x === gx && c.y === gy);
}

function isGridCellOccupied(floor, gx, gy, excludeRoom) {
  return floor.rooms.some(r => {
    if (r === excludeRoom) return false;
    return roomHasCell(r, gx, gy);
  });
}

function canPlaceRoom(floor, gx, gy, gw, gh, excludeRoom) {
  if (gx < 0 || gy < 0 || gx + gw > 7 || gy + gh > 4) return false;
  for (let x = gx; x < gx + gw; x++)
    for (let y = gy; y < gy + gh; y++)
      if (isGridCellOccupied(floor, x, y, excludeRoom)) return false;
  return true;
}

function canPlaceCell(floor, gx, gy, excludeRoom) {
  if (gx < 0 || gy < 0 || gx >= 7 || gy >= 4) return false;
  return !isGridCellOccupied(floor, gx, gy, excludeRoom);
}

function pointInRoom(px, py, room) {
  if (room._polys) return room._polys.some(poly => pointInPoly(px, py, poly));
  return room._poly && pointInPoly(px, py, room._poly);
}

// Get adjacent empty cells for expanding a room
function getExpandableCells(floor, room) {
  const cells = getRoomCells(room);
  const result = [];
  const dirs = [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
  const seen = new Set();
  cells.forEach(c => {
    dirs.forEach(({dx,dy}) => {
      const nx = c.x+dx, ny = c.y+dy;
      const key = nx+','+ny;
      if (!seen.has(key) && nx>=0 && ny>=0 && nx<7 && ny<4 && !roomHasCell(room,nx,ny) && canPlaceCell(floor,nx,ny,null)) {
        seen.add(key);
        result.push({x:nx, y:ny});
      }
    });
  });
  return result;
}

// Check if removing a cell keeps the room connected
function canRemoveCell(room, cx, cy) {
  const cells = getRoomCells(room).filter(c => !(c.x===cx && c.y===cy));
  if (cells.length === 0) return false; // can't remove last cell
  // BFS from first remaining cell
  const visited = new Set();
  const queue = [cells[0]];
  visited.add(cells[0].x+','+cells[0].y);
  while (queue.length) {
    const cur = queue.shift();
    [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}].forEach(({dx,dy}) => {
      const key = (cur.x+dx)+','+(cur.y+dy);
      if (!visited.has(key) && cells.some(c => c.x===cur.x+dx && c.y===cur.y+dy)) {
        visited.add(key);
        queue.push({x:cur.x+dx, y:cur.y+dy});
      }
    });
  }
  return visited.size === cells.length; // all cells reachable = still connected
}

function drawRoom(room, hovered) {
  const visible = isRoomVisible(room);
  const isHighlighted = room.id === highlightedRoomId;
  const {color,colorLight,name,nameEn,status} = room;
  const cells = getRoomCells(room);
  if(cells.length===0) return;
  const wallH = (hovered ? 2 : 1) * zoomLevel;
  const isSelected = editMode && editSelectedRoom === room;

  let alpha = visible ? (hovered ? 0.95 : 0.75) : 0.2;
  if (isHighlighted) {
    const t = (performance.now() - highlightPulseTime) / 400;
    alpha = 0.6 + 0.4 * Math.abs(Math.sin(t));
  }

  room._polys = [];

  // Draw each cell
  const floorTexKey = ROOM_FLOOR_MAP[room.id] || 'floorTile';
  const floorTex = texturesLoaded ? TEX[floorTexKey] : null;
  const wallTopTex = texturesLoaded ? TEX.wallTop : null;
  const wallSideTex = texturesLoaded ? TEX.wallSide : null;

  cells.forEach(cell => {
    const tl=isoProject(cell.x,cell.y), tr=isoProject(cell.x+1,cell.y);
    const br=isoProject(cell.x+1,cell.y+1), bl=isoProject(cell.x,cell.y+1);

    // Floor tile — use texture if available
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(tl.x,tl.y); ctx.lineTo(tr.x,tr.y); ctx.lineTo(br.x,br.y); ctx.lineTo(bl.x,bl.y);
    ctx.closePath();
    ctx.clip();

    ctx.globalAlpha = alpha;
    if(floorTex) {
      // Map texture into isometric diamond using transform
      const tileW = tr.x - tl.x;
      const tileH = br.y - tl.y;
      ctx.drawImage(floorTex, tl.x - tileW*0.15, tl.y - 2, tileW*1.3, tileH*1.1);
      // Color tint overlay for room identity
      ctx.globalAlpha = alpha * 0.25;
      ctx.fillStyle = hovered||isHighlighted||isSelected ? colorLight : color;
      ctx.fill();
    } else {
      // Fallback gradient
      const grad=ctx.createLinearGradient(tl.x,tl.y,br.x,br.y);
      grad.addColorStop(0, hovered||isHighlighted||isSelected ? colorLight : color);
      grad.addColorStop(1, hovered||isHighlighted||isSelected ? color : shadeColor(color,-20));
      ctx.fillStyle=grad; ctx.fill();
    }
    ctx.restore();
    ctx.globalAlpha=1;

    // Tile grid lines
    ctx.beginPath();
    ctx.moveTo(tl.x,tl.y); ctx.lineTo(tr.x,tr.y); ctx.lineTo(br.x,br.y); ctx.lineTo(bl.x,bl.y);
    ctx.closePath();
    ctx.strokeStyle = isHighlighted ? '#fff' : (hovered||isSelected ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.08)');
    ctx.lineWidth = isHighlighted ? 3 : 0.5;
    ctx.stroke();

    if(!visible && !isHighlighted) { room._polys.push([tl,tr,br,bl]); return; }

    // Walls on outer edges — use wall textures
    // Right wall (no neighbor at x+1)
    if(!hasNeighborCell(cells,cell.x,cell.y,1,0)){
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(tr.x,tr.y); ctx.lineTo(br.x,br.y); ctx.lineTo(br.x,br.y-wallH); ctx.lineTo(tr.x,tr.y-wallH);
      ctx.closePath();
      ctx.clip();
      if(wallSideTex) {
        ctx.globalAlpha=0.7;
        ctx.drawImage(wallSideTex, Math.min(tr.x,br.x), Math.min(tr.y,br.y)-wallH, Math.abs(br.x-tr.x)||wallH, br.y-tr.y+wallH);
        // Darkening overlay
        ctx.globalAlpha=0.25;
        ctx.fillStyle=shadeColor(color,-30);
        ctx.fill();
      } else {
        ctx.fillStyle=shadeColor(color,-20); ctx.globalAlpha=0.45; ctx.fill();
      }
      ctx.restore(); ctx.globalAlpha=1;
      // Wall edge line
      ctx.beginPath();
      ctx.moveTo(tr.x,tr.y-wallH); ctx.lineTo(br.x,br.y-wallH);
      ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=0.5; ctx.stroke();
    }
    // Bottom wall (no neighbor at y+1)
    if(!hasNeighborCell(cells,cell.x,cell.y,0,1)){
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(br.x,br.y); ctx.lineTo(bl.x,bl.y); ctx.lineTo(bl.x,bl.y-wallH); ctx.lineTo(br.x,br.y-wallH);
      ctx.closePath();
      ctx.clip();
      if(wallTopTex) {
        ctx.globalAlpha=0.7;
        ctx.drawImage(wallTopTex, Math.min(bl.x,br.x), Math.min(bl.y,br.y)-wallH, Math.abs(br.x-bl.x)||wallH, br.y-bl.y+wallH);
        ctx.globalAlpha=0.2;
        ctx.fillStyle=shadeColor(color,-40);
        ctx.fill();
      } else {
        ctx.fillStyle=shadeColor(color,-35); ctx.globalAlpha=0.45; ctx.fill();
      }
      ctx.restore(); ctx.globalAlpha=1;
      // Wall top edge line
      ctx.beginPath();
      ctx.moveTo(bl.x,bl.y-wallH); ctx.lineTo(br.x,br.y-wallH);
      ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=0.5; ctx.stroke();
    }

    // Top wall edge (no neighbor at y-1) — wall cap line
    if(!hasNeighborCell(cells,cell.x,cell.y,0,-1)){
      ctx.beginPath();
      ctx.moveTo(tl.x,tl.y); ctx.lineTo(tr.x,tr.y);
      ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1; ctx.stroke();
    }
    // Left wall edge (no neighbor at x-1)
    if(!hasNeighborCell(cells,cell.x,cell.y,-1,0)){
      ctx.beginPath();
      ctx.moveTo(tl.x,tl.y); ctx.lineTo(bl.x,bl.y);
      ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1; ctx.stroke();
    }

    // Outer border for selected room
    if(isSelected) {
      ctx.strokeStyle='#a29bfe'; ctx.lineWidth=2;
      if(!hasNeighborCell(cells,cell.x,cell.y,1,0)){ctx.beginPath();ctx.moveTo(tr.x,tr.y);ctx.lineTo(br.x,br.y);ctx.stroke();}
      if(!hasNeighborCell(cells,cell.x,cell.y,-1,0)){ctx.beginPath();ctx.moveTo(tl.x,tl.y);ctx.lineTo(bl.x,bl.y);ctx.stroke();}
      if(!hasNeighborCell(cells,cell.x,cell.y,0,1)){ctx.beginPath();ctx.moveTo(bl.x,bl.y);ctx.lineTo(br.x,br.y);ctx.stroke();}
      if(!hasNeighborCell(cells,cell.x,cell.y,0,-1)){ctx.beginPath();ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);ctx.stroke();}
    }

    room._polys.push([tl,tr,br,bl]);
  });

  // Draw props inside room (after all cells drawn)
  if(visible || isHighlighted) {
    const props = ROOM_PROPS_MAP[room.id];
    if(props && texturesLoaded) {
      const avgX = cells.reduce((s,c)=>s+c.x,0)/cells.length + 0.5;
      const avgY = cells.reduce((s,c)=>s+c.y,0)/cells.length + 0.5;
      const pc = isoProject(avgX, avgY);
      props.forEach((propKey, i) => {
        const propImg = TEX[propKey];
        if(!propImg) return;
        const propSize = 22 * zoomLevel;
        const ox = (i - (props.length-1)/2) * propSize * 1.2;
        ctx.globalAlpha = 0.6;
        ctx.drawImage(propImg, pc.x + ox - propSize/2, pc.y + 18 - propSize/2, propSize, propSize);
        ctx.globalAlpha = 1;
      });
    }
  }

  // Backward compat: _poly = first cell
  room._poly = room._polys[0];

  if(!visible && !isHighlighted) return;

  // Center of mass for labels
  const avgX = cells.reduce((s,c)=>s+c.x,0)/cells.length + 0.5;
  const avgY = cells.reduce((s,c)=>s+c.y,0)/cells.length + 0.5;
  const center = isoProject(avgX, avgY);
  const cx = center.x, cy = center.y;

  // Bounding box for badges
  const allXs = cells.map(c=>c.x), allYs = cells.map(c=>c.y);
  const minX=Math.min(...allXs), maxX=Math.max(...allXs)+1, minY=Math.min(...allYs), maxY=Math.max(...allYs)+1;
  const tr=isoProject(maxX,minY), bl=isoProject(minX,maxY);

  // Status dot
  const sc={available:'#00b894',occupied:'#e17055',cleaning:'#fdcb6e'};
  ctx.beginPath(); ctx.arc(cx,cy-20,5,0,Math.PI*2);
  ctx.fillStyle=sc[status]; ctx.fill();
  ctx.strokeStyle='#0f1117'; ctx.lineWidth=2; ctx.stroke();

  // Label
  ctx.fillStyle='#fff'; ctx.font='bold 11px "Segoe UI",system-ui,sans-serif'; ctx.textAlign='center';
  ctx.fillText(name,cx,cy-4);
  ctx.font='9px "Segoe UI",system-ui,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.65)';
  ctx.fillText(nameEn,cx,cy+9);

  // Capacity bar
  const roomCap = getRoomCapacity(room);
  if(roomCap > 0) {
    const barW = 40, barH = 3, barX = cx-barW/2, barY = cy+14;
    const capRat = room.pets.length / roomCap;
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.roundRect(barX,barY,barW,barH,1.5); ctx.fill();
    if(room.pets.length>0){
      ctx.fillStyle = capRat<=0.5?'#00b894':capRat<=0.8?'#fdcb6e':'#e17055';
      ctx.beginPath(); ctx.roundRect(barX,barY,barW*capRat,barH,1.5); ctx.fill();
    }
  }

  // Pet badge
  if(room.pets.length>0){
    const bx=tr.x-8,by=tr.y-2;
    ctx.beginPath(); ctx.arc(bx,by,10,0,Math.PI*2);
    ctx.fillStyle='#e17055'; ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 10px sans-serif';
    ctx.fillText(room.pets.length,bx,by+3.5);
  }

  // Checkout badge
  const coBadge = getCheckoutBadge(room);
  if(coBadge && room.pets.length>0){
    const badgeX=bl.x+8, badgeY=bl.y-4;
    ctx.font='bold 7px sans-serif';
    const tw2=ctx.measureText(coBadge.text).width+8;
    ctx.fillStyle=coBadge.bg; ctx.beginPath(); ctx.roundRect(badgeX-tw2/2,badgeY-6,tw2,12,3); ctx.fill();
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.fillText(coBadge.text,badgeX,badgeY+2);
  }

  // Price
  if(room.price>0){
    ctx.font='8px sans-serif'; ctx.fillStyle='rgba(0,184,148,0.85)'; ctx.textAlign='center';
    ctx.fillText(formatVND(room.price)+'đ',cx,cy+22);
  }

  // Highlight glow
  if(isHighlighted){
    ctx.save(); ctx.shadowColor='#fff'; ctx.shadowBlur=15;
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2;
    cells.forEach(c=>{
      const p=isoProject(c.x,c.y),q=isoProject(c.x+1,c.y),r2=isoProject(c.x+1,c.y+1),s=isoProject(c.x,c.y+1);
      ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.lineTo(r2.x,r2.y);ctx.lineTo(s.x,s.y);ctx.closePath();ctx.stroke();
    });
    ctx.restore();
  }
}

// ── Stacked 2D Flat Floor Plan View ──
function drawStackedFloors() {
  const totalFloors = floors.length;
  const CELL_2D = 80; // px per grid cell (2D top-down)
  const COLS = 7, ROWS = 4;
  const floorW = COLS * CELL_2D;
  const floorH = ROWS * CELL_2D;
  const stackGap = floorH + 50; // gap between floors
  const centerY = canvas.clientHeight / 2;
  const centerX = canvas.clientWidth / 2 - 100; // offset for sidebar

  // Draw inactive first, active last
  const drawOrder = [];
  for (let fi = 0; fi < totalFloors; fi++) { if (fi !== currentFloor) drawOrder.push(fi); }
  drawOrder.push(currentFloor);

  for (const fi of drawOrder) {
    const floor = floors[fi];
    const isActive = fi === currentFloor;
    const dist = Math.abs(fi - currentFloor);

    // Position: active centered, others above/below
    const floorY = centerY - floorH / 2 + (currentFloor - fi) * stackGap;
    const floorX = centerX - floorW / 2;

    ctx.save();
    const baseAlpha = isActive ? 1.0 : 0.15;
    ctx.globalAlpha = baseAlpha;

    // Scale inactive floors smaller
    if (!isActive) {
      const scale = 0.7 - dist * 0.05;
      const cx = floorX + floorW / 2, cy = floorY + floorH / 2;
      ctx.translate(cx, cy);
      ctx.scale(scale, scale);
      ctx.translate(-cx, -cy);
    }

    // Floor background
    ctx.fillStyle = isActive ? '#1a1d27' : '#13151d';
    ctx.beginPath();
    ctx.roundRect(floorX - 8, floorY - 8, floorW + 16, floorH + 16, 12);
    ctx.fill();

    // Active glow border
    if (isActive) {
      ctx.save();
      ctx.shadowColor = '#6c5ce7';
      ctx.shadowBlur = 20;
      ctx.strokeStyle = 'rgba(108,92,231,0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(floorX - 8, floorY - 8, floorW + 16, floorH + 16, 12);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // Floor label above
    ctx.fillStyle = isActive ? '#a29bfe' : 'rgba(148,152,176,0.7)';
    ctx.font = isActive ? 'bold 14px sans-serif' : '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.globalAlpha = isActive ? 1 : 0.5;
    ctx.fillText(floor.icon + ' ' + floor.name + (isActive ? ' — ' + floor.description : ''), floorX + floorW / 2, floorY - 18);
    ctx.globalAlpha = baseAlpha;

    // Wall grid (all cells that are not rooms = walls)
    const occupiedCells = new Set();
    floor.rooms.forEach(room => {
      getRoomCells(room).forEach(c => occupiedCells.add(c.x + ',' + c.y));
    });

    for (let gx = 0; gx < COLS; gx++) {
      for (let gy = 0; gy < ROWS; gy++) {
        const x = floorX + gx * CELL_2D;
        const y = floorY + gy * CELL_2D;
        if (!occupiedCells.has(gx + ',' + gy)) {
          // Wall / hallway cell
          ctx.fillStyle = isActive ? '#0f1117' : '#0c0e14';
          ctx.fillRect(x, y, CELL_2D, CELL_2D);
          ctx.strokeStyle = 'rgba(255,255,255,0.04)';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(x, y, CELL_2D, CELL_2D);
        }
      }
    }

    // Draw rooms
    floor.rooms.forEach(room => {
      const visible = isRoomVisible(room);
      const { color, colorLight, name: rName, nameEn, status } = room;
      const cells = getRoomCells(room);
      if (cells.length === 0) return;

      // Find bounding rect
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      cells.forEach(c => {
        minX = Math.min(minX, c.x); minY = Math.min(minY, c.y);
        maxX = Math.max(maxX, c.x + 1); maxY = Math.max(maxY, c.y + 1);
      });
      const rx = floorX + minX * CELL_2D;
      const ry = floorY + minY * CELL_2D;
      const rw = (maxX - minX) * CELL_2D;
      const rh = (maxY - minY) * CELL_2D;

      const alpha2 = visible ? 0.85 : 0.2;

      // Draw each cell of the room
      cells.forEach(c => {
        const cx = floorX + c.x * CELL_2D;
        const cy = floorY + c.y * CELL_2D;

        // Fill
        ctx.fillStyle = color;
        ctx.globalAlpha = baseAlpha * alpha2;
        ctx.fillRect(cx + 1, cy + 1, CELL_2D - 2, CELL_2D - 2);

        // Border between cells
        ctx.strokeStyle = isActive ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.03)';
        ctx.lineWidth = 0.5;
        ctx.globalAlpha = baseAlpha;
        ctx.strokeRect(cx + 1, cy + 1, CELL_2D - 2, CELL_2D - 2);
      });

      // Outer wall: thick border on edges not shared with other cells of this room
      if (isActive) {
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.globalAlpha = alpha2;
        cells.forEach(c => {
          const cx = floorX + c.x * CELL_2D;
          const cy = floorY + c.y * CELL_2D;
          // Top wall
          if (!hasNeighborCell(cells, c.x, c.y, 0, -1)) {
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + CELL_2D, cy); ctx.stroke();
          }
          // Bottom wall
          if (!hasNeighborCell(cells, c.x, c.y, 0, 1)) {
            ctx.beginPath(); ctx.moveTo(cx, cy + CELL_2D); ctx.lineTo(cx + CELL_2D, cy + CELL_2D); ctx.stroke();
          }
          // Left wall
          if (!hasNeighborCell(cells, c.x, c.y, -1, 0)) {
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy + CELL_2D); ctx.stroke();
          }
          // Right wall
          if (!hasNeighborCell(cells, c.x, c.y, 1, 0)) {
            ctx.beginPath(); ctx.moveTo(cx + CELL_2D, cy); ctx.lineTo(cx + CELL_2D, cy + CELL_2D); ctx.stroke();
          }
        });
      }

      ctx.globalAlpha = baseAlpha;

      // Room label (centered in bounding rect)
      const labelX = rx + rw / 2;
      const labelY = ry + rh / 2;

      // Store poly for click detection
      room._polys = cells.map(c => {
        const cx = floorX + c.x * CELL_2D, cy = floorY + c.y * CELL_2D;
        return [{x:cx,y:cy},{x:cx+CELL_2D,y:cy},{x:cx+CELL_2D,y:cy+CELL_2D},{x:cx,y:cy+CELL_2D}];
      });

      if (isActive) {
        // Room name
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.globalAlpha = visible ? 0.95 : 0.3;
        ctx.fillText(rName, labelX, labelY - 6);

        // English name
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.font = '9px sans-serif';
        ctx.fillText(nameEn, labelX, labelY + 7);

        // Status dot + text
        const statusColors = { available: '#00b894', occupied: '#e17055', cleaning: '#fdcb6e' };
        const statusLabels = { available: 'Available', occupied: 'Occupied', cleaning: 'Cleaning' };
        const sc = statusColors[status] || '#6b7280';
        ctx.globalAlpha = visible ? 0.8 : 0.3;

        // Dot
        ctx.beginPath();
        ctx.arc(labelX - 25, labelY + 20, 4, 0, Math.PI * 2);
        ctx.fillStyle = sc; ctx.fill();

        // Status text
        ctx.fillStyle = sc;
        ctx.font = 'bold 9px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(statusLabels[status] || status, labelX - 18, labelY + 23);
        ctx.textAlign = 'center';

        // Pet count badge
        if (status === 'occupied' && room.pets.length > 0) {
          const bx = rx + rw - 14, by = ry + 14;
          ctx.beginPath(); ctx.arc(bx, by, 11, 0, Math.PI * 2);
          ctx.fillStyle = '#e17055'; ctx.globalAlpha = 0.9; ctx.fill();
          ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif';
          ctx.fillText(room.pets.length, bx, by + 4);
        }

        // Price
        if (room.price > 0 && visible) {
          ctx.fillStyle = 'rgba(253,121,168,0.65)';
          ctx.font = '9px sans-serif';
          ctx.globalAlpha = 0.7;
          ctx.fillText(formatVND(room.price), labelX, labelY + 36);
        }

        // Schedule badge
        if (room.schedule) {
          room.schedule.forEach(s => {
            const badgeText = s.when === 'today' ? 'HÔM NAY' : s.when === 'tomorrow' ? 'NGÀY MAI' : '';
            const badgeColor = s.when === 'today' ? '#e17055' : '#fdcb6e';
            if (badgeText) {
              ctx.globalAlpha = 0.85;
              ctx.font = 'bold 8px sans-serif';
              const tw = ctx.measureText(badgeText).width;
              ctx.fillStyle = badgeColor;
              ctx.beginPath(); ctx.roundRect(rx + 4, ry + 4, tw + 10, 15, 3); ctx.fill();
              ctx.fillStyle = '#fff'; ctx.textAlign = 'left';
              ctx.fillText(badgeText, rx + 9, ry + 14);
              ctx.textAlign = 'center';
            }
          });
        }
      } else {
        // Inactive: minimal label
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = 'bold 9px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(rName, labelX, labelY);
        if (status === 'occupied' && room.pets.length > 0) {
          const bx = rx + rw - 10, by = ry + 10;
          ctx.beginPath(); ctx.arc(bx, by, 8, 0, Math.PI * 2);
          ctx.fillStyle = '#e17055'; ctx.fill();
          ctx.fillStyle = '#fff'; ctx.font = 'bold 8px sans-serif';
          ctx.fillText(room.pets.length, bx, by + 3);
        }
      }
    });

    ctx.restore();
  }
}

function draw2D() {
  ctx.clearRect(0,0,canvas.clientWidth,canvas.clientHeight);

  // ── Stacked multi-floor view ──
  if (stackedView && !editMode && floors.length > 1) {
    drawStackedFloors();
    animFrame2d=requestAnimationFrame(draw2D);
    return;
  }

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.03)'; ctx.lineWidth=1;
  for(let i=0;i<=7;i++){const a=isoProject(i,0),b=isoProject(i,4);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
  for(let j=0;j<=4;j++){const a=isoProject(0,j),b=isoProject(7,j);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}

  // Edit mode: grid cell overlay
  if (editMode) {
    const floor = floors[currentFloor];
    for(let gx=0;gx<7;gx++){
      for(let gy=0;gy<4;gy++){
        const tl=isoProject(gx,gy), tr=isoProject(gx+1,gy);
        const br=isoProject(gx+1,gy+1), bl=isoProject(gx,gy+1);
        ctx.beginPath();
        ctx.moveTo(tl.x,tl.y); ctx.lineTo(tr.x,tr.y); ctx.lineTo(br.x,br.y); ctx.lineTo(bl.x,bl.y);
        ctx.closePath();
        const occ = isGridCellOccupied(floor, gx, gy, null);
        ctx.fillStyle = occ ? 'rgba(225,112,85,0.03)' : 'rgba(108,92,231,0.06)';
        ctx.fill();
        ctx.strokeStyle = occ ? 'rgba(225,112,85,0.12)' : 'rgba(108,92,231,0.2)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
        if(!occ) {
          const cx=(tl.x+tr.x+br.x+bl.x)/4, cy=(tl.y+tr.y+br.y+bl.y)/4;
          ctx.fillStyle='rgba(108,92,231,0.25)'; ctx.font='bold 14px sans-serif'; ctx.textAlign='center';
          ctx.fillText('+',cx,cy+5);
        }
      }
    }
  }

  // Room shadows (visual polish)
  activeRooms().forEach(r => {
    getRoomCells(r).forEach(c => {
      const tl=isoProject(c.x,c.y), tr=isoProject(c.x+1,c.y);
      const br=isoProject(c.x+1,c.y+1), bl=isoProject(c.x,c.y+1);
      ctx.beginPath();
      ctx.moveTo(tl.x+3,tl.y+4); ctx.lineTo(tr.x+3,tr.y+4); ctx.lineTo(br.x+3,br.y+4); ctx.lineTo(bl.x+3,bl.y+4);
      ctx.closePath();
      ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fill();
    });
  });

  // Rooms
  activeRooms().forEach(r => drawRoom(r, r===hoveredRoom));

  // Ghost room during drag in edit mode
  if (editMode && editDragRoom && editGhostPos) {
    const {gx,gy} = editGhostPos;
    const gw = editDragRoom.gridW, gh = editDragRoom.gridH;
    const valid = canPlaceRoom(floors[currentFloor], gx, gy, gw, gh, editDragRoom);
    const tl=isoProject(gx,gy), tr=isoProject(gx+gw,gy);
    const br=isoProject(gx+gw,gy+gh), bl=isoProject(gx,gy+gh);
    ctx.beginPath();
    ctx.moveTo(tl.x,tl.y); ctx.lineTo(tr.x,tr.y); ctx.lineTo(br.x,br.y); ctx.lineTo(bl.x,bl.y);
    ctx.closePath();
    ctx.fillStyle = valid ? 'rgba(0,184,148,0.2)' : 'rgba(225,112,85,0.2)';
    ctx.fill();
    ctx.strokeStyle = valid ? '#00b894' : '#e17055';
    ctx.lineWidth = 2;
    ctx.setLineDash([6,4]); ctx.stroke(); ctx.setLineDash([]);
    // Room name on ghost
    const cx=(tl.x+br.x)/2, cy=(tl.y+br.y)/2;
    ctx.fillStyle = valid ? 'rgba(0,184,148,0.7)' : 'rgba(225,112,85,0.7)';
    ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
    ctx.fillText(editDragRoom.name, cx, cy+4);
  }

  // Cell expand/shrink buttons for selected room in edit mode
  if (editMode && editSelectedRoom && !editDragRoom) {
    const rm = editSelectedRoom;
    // Show "+" on adjacent empty cells (expand)
    const expandable = getExpandableCells(floors[currentFloor], rm);
    expandable.forEach(({x,y}) => {
      const tl=isoProject(x,y), tr=isoProject(x+1,y), br=isoProject(x+1,y+1), bl=isoProject(x,y+1);
      const cx2=(tl.x+br.x)/2, cy2=(tl.y+br.y)/2;
      // Highlight cell
      ctx.beginPath();
      ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);
      ctx.closePath();
      ctx.fillStyle='rgba(108,92,231,0.12)'; ctx.fill();
      ctx.strokeStyle='rgba(108,92,231,0.4)'; ctx.lineWidth=1; ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
      // "+" button
      ctx.beginPath(); ctx.arc(cx2,cy2,9,0,Math.PI*2);
      ctx.fillStyle='rgba(0,184,148,0.8)'; ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
      ctx.fillText('+',cx2,cy2+4);
    });
    // Show "−" on edge cells that can be removed (shrink)
    const cells = getRoomCells(rm);
    if(cells.length > 1) {
      cells.forEach(c => {
        if(canRemoveCell(rm, c.x, c.y)) {
          const tl=isoProject(c.x,c.y), br=isoProject(c.x+1,c.y+1);
          const cx2=(tl.x+br.x)/2, cy2=(tl.y+br.y)/2;
          ctx.beginPath(); ctx.arc(cx2+12,cy2-12,7,0,Math.PI*2);
          ctx.fillStyle='rgba(225,112,85,0.8)'; ctx.fill();
          ctx.fillStyle='#fff'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
          ctx.fillText('\u2212',cx2+12,cy2-9);
        }
      });
    }
  }

  // Floor label banner
  const flr = floors[currentFloor];
  const bannerY = 20;
  ctx.fillStyle='rgba(26,29,39,0.7)'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
  ctx.fillText(`${flr.icon} ${flr.name} — ${flr.description}`, canvas.clientWidth/2, bannerY);

  // Hallway
  ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.font='10px sans-serif'; ctx.textAlign='center';
  const cp=isoProject(3.5,2);
  ctx.fillText('HALLWAY',cp.x,cp.y-5);

  // Elevator
  const epos=isoProject(7.3,1.8);
  ctx.save(); ctx.globalAlpha=0.5;
  ctx.beginPath();
  const ew=28,eh=36;
  ctx.roundRect(epos.x-ew/2,epos.y-eh/2,ew,eh,4);
  ctx.fillStyle='#1a1d27'; ctx.fill();
  ctx.strokeStyle='#6c5ce7'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.globalAlpha=0.8; ctx.fillStyle='#a29bfe'; ctx.font='12px sans-serif';
  ctx.fillText('\u{1F6D7}',epos.x,epos.y+1);
  ctx.font='bold 8px sans-serif'; ctx.fillText('F'+floors[currentFloor].id,epos.x,epos.y+14);
  ctx.restore();

  animFrame2d=requestAnimationFrame(draw2D);
}

// ── Mouse / Touch ──
function getEventPos(e){const r=canvas.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}

canvas.addEventListener('mousemove', e => {
  if(currentView!=='2d'||floorTransitioning) return;
  const p=getEventPos(e);

  // Edit mode drag
  if (editMode && editMouseDown && editDragRoom) {
    editDragMoved = true;
    tooltip.style.display='none';
    const grid = screenToGrid(p.x, p.y);
    editGhostPos = { gx: grid.gx, gy: grid.gy };
    canvas.style.cursor = 'grabbing';
    return;
  }

  // Hide tooltip near expand buttons in edit mode
  if(editMode && editSelectedRoom && !editMouseDown) {
    const grid2 = screenToGrid(p.x, p.y);
    const expandable = getExpandableCells(floors[currentFloor], editSelectedRoom);
    if(expandable.some(c => c.x===grid2.gx && c.y===grid2.gy)) {
      canvas.style.cursor = 'pointer';
      tooltip.style.display='none';
      hoveredRoom=null;
      return;
    }
  }

  let found=null;
  const rooms=activeRooms();
  for(let i=rooms.length-1;i>=0;i--){
    if(pointInRoom(p.x,p.y,rooms[i])){
      if(editMode || isRoomVisible(rooms[i])){found=rooms[i];break;}
    }
  }
  hoveredRoom=found;
  if(editMode) {
    canvas.style.cursor = found ? 'grab' : 'cell';
  } else {
    canvas.style.cursor=found?'pointer':'default';
  }
  if(found){
    tooltip.style.display='block';
    tooltip.style.left=(e.clientX+14)+'px'; tooltip.style.top=(e.clientY+14)+'px';
    const sl={available:'Available',occupied:'Occupied',cleaning:'Cleaning'};
    tooltip.innerHTML=`<strong>${found.name}</strong><br><span style="color:var(--text2)">${found.nameEn}</span><br><span style="font-size:11px">${sl[found.status]}${found.pets.length?' \u00B7 '+found.pets.length+' pet(s)':''}</span><br><span style="font-size:10px;color:var(--accent2)">${floors[currentFloor].name}</span>`;
  } else tooltip.style.display='none';
});

canvas.addEventListener('mouseleave', ()=>{hoveredRoom=null;tooltip.style.display='none';});

// (Resize handles replaced by cell expand/shrink buttons)

// Edit mode: mousedown to start drag or resize
canvas.addEventListener('mousedown', e => {
  if(!editMode || currentView!=='2d') return;
  const p=getEventPos(e);

  // Check room drag
  const rooms=activeRooms();
  for(let i=rooms.length-1;i>=0;i--){
    if(pointInRoom(p.x,p.y,rooms[i])){
      editDragRoom=rooms[i];
      editDragStart={gx:rooms[i].gridX,gy:rooms[i].gridY};
      editGhostPos={gx:rooms[i].gridX,gy:rooms[i].gridY};
      editMouseDown=true;
      editDragMoved=false;
      e.preventDefault();
      return;
    }
  }
  editMouseDown=true;
  editDragMoved=false;
});

// Edit mode: mouseup to finish drag or resize
canvas.addEventListener('mouseup', e => {
  if(!editMode) { editMouseDown=false; return; }
  const p=getEventPos(e);

  // Finish drag
  if(editDragRoom && editDragMoved && editGhostPos) {
    const {gx,gy} = editGhostPos;
    if(canPlaceRoom(floors[currentFloor], gx, gy, editDragRoom.gridW, editDragRoom.gridH, editDragRoom)) {
      editDragRoom.gridX = gx;
      editDragRoom.gridY = gy;
      showToast('info','Di chuyển phòng',`${editDragRoom.name} \u2192 (${gx},${gy})`);
      refreshAfterAction(editDragRoom);
    }
  } else if(!editDragMoved) {
    handleSelect(p);
  }

  editDragRoom=null; editDragStart=null; editGhostPos=null;
  editMouseDown=false; editDragMoved=false;
  canvas.style.cursor='cell';
});

canvas.addEventListener('click', e => {
  if(editMode) return; // handled by mouseup in edit mode
  if(panDragMoved) { panDragMoved = false; return; } // ignore click after drag
  handleSelect(getEventPos(e));
});
canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  if(e.changedTouches.length){const r=canvas.getBoundingClientRect(),t=e.changedTouches[0];handleSelect({x:t.clientX-r.left,y:t.clientY-r.top});}
});

function handleSelect(p){
  if(currentView!=='2d'||floorTransitioning) return;

  if(editMode) {
    const grid=screenToGrid(p.x,p.y);
    const floor=floors[currentFloor];

    // If a room is selected, check expand/shrink first
    if(editSelectedRoom) {
      // Check "+" expand: click on adjacent empty cell
      const expandable = getExpandableCells(floor, editSelectedRoom);
      const expandHit = expandable.find(({x,y}) => {
        const tl=isoProject(x,y),tr=isoProject(x+1,y),br=isoProject(x+1,y+1),bl=isoProject(x,y+1);
        return pointInPoly(p.x,p.y,[tl,tr,br,bl]);
      });
      if(expandHit) {
        // Add cell to room
        if(!editSelectedRoom.cells) editSelectedRoom.cells = getRoomCells(editSelectedRoom);
        editSelectedRoom.cells.push({x:expandHit.x, y:expandHit.y});
        showToast('info','Mở rộng',`${editSelectedRoom.name} +1 ô`);
        refreshAfterAction(editSelectedRoom);
        // Re-open edit panel
        showEditPanel(editSelectedRoom);
        return;
      }

      // Check "−" shrink: click on removable cell of selected room
      const cells = getRoomCells(editSelectedRoom);
      if(cells.length > 1) {
        const shrinkHit = cells.find(c => {
          if(!canRemoveCell(editSelectedRoom, c.x, c.y)) return false;
          // Check click near the "−" button position (top-right of cell)
          const tl=isoProject(c.x,c.y),br=isoProject(c.x+1,c.y+1);
          const bx=(tl.x+br.x)/2+12, by=(tl.y+br.y)/2-12;
          const dx=p.x-bx, dy=p.y-by;
          return dx*dx+dy*dy < 10*10;
        });
        if(shrinkHit) {
          if(!editSelectedRoom.cells) editSelectedRoom.cells = getRoomCells(editSelectedRoom);
          editSelectedRoom.cells = editSelectedRoom.cells.filter(c => !(c.x===shrinkHit.x && c.y===shrinkHit.y));
          showToast('info','Thu nhỏ',`${editSelectedRoom.name} -1 ô`);
          refreshAfterAction(editSelectedRoom);
          showEditPanel(editSelectedRoom);
          return;
        }
      }
    }

    // Check room click
    const rooms=activeRooms();
    for(let i=rooms.length-1;i>=0;i--){
      if(pointInRoom(p.x,p.y,rooms[i])){
        showEditPanel(rooms[i]); return;
      }
    }
    // Empty cell click → add room
    if(grid.gx>=0 && grid.gx<7 && grid.gy>=0 && grid.gy<4){
      if(!isGridCellOccupied(floor,grid.gx,grid.gy,null)){
        showAddRoomPanel(grid.gx,grid.gy);
      }
    }
    return;
  }

  const rooms=activeRooms();
  for(let i=rooms.length-1;i>=0;i--){
    if(pointInRoom(p.x,p.y,rooms[i])&&isRoomVisible(rooms[i])){selectRoom(rooms[i]);return;}
  }
}
