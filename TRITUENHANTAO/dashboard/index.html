// ── ROOM SELECT & 3D ──
// ══════════════════════════════════
function selectRoom(room){
  selectedRoom=room; tooltip.style.display='none';
  showInfoPanel(room);
}

function getRoomCapacity(room) {
  // Infer capacity from furniture
  const f = room.furniture.join(' ');
  const match = f.match(/x(\d+)/);
  if (match) return parseInt(match[1]);
  if (room.id.includes('dog_large')) return 4;
  if (room.id.includes('dog_small')) return 3;
  if (room.id.includes('cat')) return 3;
  if (room.id.includes('exotic')) return 2;
  if (room.id.includes('recovery')) return 4;
  if (room.id.includes('surg') || room.id.includes('groom') || room.id.includes('exam') || room.id.includes('emergency')) return 1;
  return 0; // rooms like pharmacy, staff, food, lab, reception
}

function getCapacityColor(ratio) {
  if (ratio <= 0.5) return 'var(--green)';
  if (ratio <= 0.8) return 'var(--orange)';
  return 'var(--red)';
}

function showInfoPanel(room){
  const sl={available:'Available',occupied:'Occupied',cleaning:'Cleaning'};
  const sc='status-'+room.status;
  const cap = getRoomCapacity(room);
  const used = room.pets.length;
  const capRatio = cap > 0 ? used / cap : 0;

  let html=`
    <div class="panel-room-name">${room.name}</div>
    <div class="panel-room-sub">${room.nameEn} \u00B7 ${floors[currentFloor].name}</div>
    <div class="panel-room-status ${sc}">${sl[room.status]}</div>`;
  if(room.price > 0) {
    html += `<div class="panel-price">\u{1F4B0} ${formatVNDFull(room.price)} <span class="price-unit">/ đêm</span></div>`;
  }

  // Capacity bar
  if (cap > 0) {
    html += `<div class="capacity-bar">
      <div class="capacity-bar-label">
        <span>Capacity</span>
        <span style="color:${getCapacityColor(capRatio)};font-weight:600">${used}/${cap}</span>
      </div>
      <div class="capacity-bar-track">
        <div class="capacity-bar-fill" style="width:${capRatio*100}%;background:${getCapacityColor(capRatio)}"></div>
      </div>
    </div>`;
  }

  // Quick action buttons
  html += `<div class="quick-actions">`;
  if (room.status === 'available' && cap > 0) {
    html += `<button class="qa-btn checkin" data-action="checkin" data-room="${room.id}">\u{1F43E} Check-in</button>`;
  }
  if (room.pets.length > 0) {
    html += `<button class="qa-btn checkout" data-action="checkout" data-room="${room.id}">\u{1F4E4} Check-out</button>`;
  }
  if (room.status === 'occupied' && room.pets.length === 0) {
    html += `<button class="qa-btn clean" data-action="clean" data-room="${room.id}">\u{1F9F9} Clean</button>`;
  }
  if (room.status === 'cleaning') {
    html += `<button class="qa-btn checkin" data-action="markready" data-room="${room.id}">\u2705 Mark Ready</button>`;
  }
  html += `</div>`;

  html += `<div class="panel-section"><h3>Furniture & Equipment</h3>
    <div class="furniture-list">${room.furniture.map(f=>`<span class="furniture-tag">${f}</span>`).join('')}</div>
  </div>`;

  // Empty state for available rooms with capacity
  if(room.pets.length === 0 && cap > 0) {
    const emojis = {dog:'\u{1F436}',cat:'\u{1F431}',exotic:'\u{1F98E}',medical:'\u{1FA7A}'};
    const types = (room.tags||[]).filter(t=>['dog','cat','exotic'].includes(t));
    const icon = types.length ? emojis[types[0]] : '\u{1F3E0}';
    html += `<div class="panel-section">
      <div class="empty-state">
        <div class="es-icon">${icon}</div>
        <div class="es-title">Phòng trống</div>
        <div class="es-sub">Sẵn sàng nhận ${cap} thú cưng.<br>Nhấn <b>Check-in</b> để thêm pet mới.</div>
      </div>
    </div>`;
  }

  if(room.pets.length>0){
    html+=`<div class="panel-section"><h3>Current Pets (${room.pets.length})</h3>`;
    room.pets.forEach((p,pi)=>{
      const days=Math.max(1,Math.floor((Date.now()-new Date(p.checkin).getTime())/(86400000)));
      const bill = (room.price||0) * days;
      html+=`<div class="pet-card">
        <div class="name">${p.type==='cat'?'\u{1F431}':p.type==='exotic'?'\u{1F98E}':'\u{1F436}'} ${p.name}</div>
        <div class="breed">${p.breed}</div>
        ${p.owner ? `<div class="pet-owner">\u{1F464} ${p.owner}</div>` : ''}
        <div class="date">Check-in: ${p.checkin}</div>
        ${p.checkout ? `<div class="pet-checkout">\u{1F4C5} Check-out: ${p.checkout}</div>` : ''}
        <div class="pet-timer">${days} ngày${bill > 0 ? ' · <span style="color:var(--green);font-weight:600">'+formatVNDFull(bill)+'</span>' : ''}</div>
        ${p.phone ? `<div class="pet-contact">
          <a href="tel:${p.phone}" class="contact-btn call">\u{1F4DE} Gọi ${p.phone}</a>
          <a href="sms:${p.phone}" class="contact-btn sms">\u{1F4AC} Nhắn tin</a>
        </div>` : ''}
        <button class="qa-btn checkout" style="margin-top:8px;padding:6px" data-action="checkout-single" data-room="${room.id}" data-pet="${pi}">\u{1F4E4} Check-out ${p.name}</button>
      </div>`;
    });
    html+=`</div>`;
  }
  infoPanel.innerHTML=html;
  setTimeout(()=>infoPanel.classList.add('open'),50);

  // Bind quick action events
  infoPanel.querySelectorAll('.qa-btn').forEach(btn => {
    btn.addEventListener('click', () => handleQuickAction(btn.dataset.action, room, btn.dataset.pet));
  });
}

// ── EDIT PANEL (Simplified) ──
// ══════════════════════════════════
const ROOM_ICONS = {exam:'\u{1FA7A}',boarding_dog:'\u{1F436}',boarding_cat:'\u{1F431}',exotic:'\u{1F98E}',surgery:'\u{1F52A}',grooming:'\u{1F6C1}',recovery:'\u{1F3E5}',reception:'\u{1F4CB}',play_area:'\u{1F3BE}',lab:'\u{1F52C}',pharmacy:'\u{1F48A}',staff:'\u{2615}',empty:'\u{1F4E6}'};

// Find empty space on current floor for a room of given size
function findEmptySpace(floor, gw, gh) {
  for(let gy=0; gy<=4-gh; gy++){
    for(let gx=0; gx<=7-gw; gx++){
      if(canPlaceRoom(floor, gx, gy, gw, gh, null)) return {gx,gy};
    }
  }
  return null;
}

// ── Simple Edit Panel (click existing room) ──
function showEditPanel(room) {
  editSelectedRoom = room;
  const tOpts = Object.entries(ROOM_TEMPLATES).map(([k,t])=>`<option value="${k}" ${room.name===t.name?'selected':''}>${t.name}</option>`).join('');
  infoPanel.innerHTML = `
    <div class="edit-panel-header">
      <div class="edit-panel-title">\u270F\uFE0F ${room.name}</div>
      <button class="edit-close-btn" id="ep-close">\u2715</button>
    </div>
    <div class="edit-form-group">
      <label>Loại phòng</label>
      <select id="ep-template" class="edit-select"><option value="">-- Tùy chỉnh --</option>${tOpts}</select>
    </div>
    <div class="edit-form-group">
      <label>Tên phòng</label>
      <input id="ep-name" class="edit-input" value="${room.name}">
    </div>
    <div class="edit-form-group">
      <label>Giá (VND/đêm)</label>
      <input id="ep-price" class="edit-input" type="number" min="0" step="50000" value="${room.price||0}">
    </div>
    <div class="edit-form-group">
      <label>Kích thước</label>
      <div class="edit-grid-2col">
        <select id="ep-size" class="edit-select">
          <option value="2,2" ${room.gridW===2&&room.gridH===2?'selected':''}>Nhỏ (2x2)</option>
          <option value="3,2" ${room.gridW===3&&room.gridH===2?'selected':''}>Vừa (3x2)</option>
          <option value="2,1" ${room.gridW===2&&room.gridH===1?'selected':''}>Hẹp (2x1)</option>
          <option value="3,1" ${room.gridW===3&&room.gridH===1?'selected':''}>Dài (3x1)</option>
        </select>
        <div style="display:flex;align-items:center;gap:6px">
          <label style="margin:0;font-size:10px;color:var(--text2)">Màu</label>
          <input id="ep-color" type="color" value="${room.color}" class="edit-color-swatch">
        </div>
      </div>
    </div>
    <div class="edit-btn-row">
      <button class="edit-btn primary" id="ep-save">\u2714 Lưu</button>
      <button class="edit-btn danger" id="ep-delete">\u{1F5D1} Xóa</button>
    </div>`;
  infoPanel.classList.add('open');

  document.getElementById('ep-close').onclick = () => { infoPanel.classList.remove('open'); };
  document.getElementById('ep-template').onchange = e => {
    const t = ROOM_TEMPLATES[e.target.value];
    if(!t) return;
    document.getElementById('ep-name').value = t.name;
    document.getElementById('ep-price').value = t.price;
    document.getElementById('ep-color').value = t.color;
  };
  document.getElementById('ep-save').onclick = () => {
    const tplKey = document.getElementById('ep-template').value;
    const tpl = ROOM_TEMPLATES[tplKey];
    room.name = document.getElementById('ep-name').value;
    room.nameEn = tpl ? tpl.nameEn : room.nameEn;
    room.price = parseInt(document.getElementById('ep-price').value)||0;
    room.color = document.getElementById('ep-color').value;
    room.colorLight = shadeColor(room.color, 40);
    const [gw,gh] = document.getElementById('ep-size').value.split(',').map(Number);
    if(gw!==room.gridW || gh!==room.gridH) {
      if(canPlaceRoom(floors[currentFloor], room.gridX, room.gridY, gw, gh, room)){
        room.gridW=gw; room.gridH=gh;
      } else { showToast('info','Không thể đổi kích thước','Không đủ chỗ'); }
    }
    if(tpl) {
      room.tags=[...tpl.tags]; room.furniture=[...tpl.furniture];
      room.furnitureItems=JSON.parse(JSON.stringify(tpl.furnitureItems));
    }
    showToast('info','Đã cập nhật',room.name);
    refreshAfterAction(room); infoPanel.classList.remove('open');
  };
  document.getElementById('ep-delete').onclick = () => {
    if(!confirm(`Xóa "${room.name}"?`)) return;
    const rooms=floors[currentFloor].rooms;
    const idx=rooms.indexOf(room);
    if(idx!==-1) rooms.splice(idx,1);
    showToast('info','Đã xóa',room.name);
    infoPanel.classList.remove('open'); refreshAfterAction(null);
  };
}

// ── Room Palette (click empty cell → show palette of room types) ──
function showAddRoomPanel(gx, gy) {
  const paletteItems = Object.entries(ROOM_TEMPLATES).filter(([k])=>k!=='empty').map(([k,t])=>{
    const icon = ROOM_ICONS[k]||'\u{1F3E0}';
    const priceLabel = t.price>0 ? formatVND(t.price)+'đ' : 'Miễn phí';
    return `<div class="rp-card" data-tpl="${k}" data-gx="${gx}" data-gy="${gy}">
      <div class="rp-icon">${icon}</div>
      <div class="rp-name"><span class="rp-dot" style="background:${t.color}"></span>${t.name}</div>
      <div class="rp-price">${priceLabel}</div>
    </div>`;
  }).join('');

  infoPanel.innerHTML = `
    <div class="edit-panel-header">
      <div class="edit-panel-title">\u2795 Chọn loại phòng</div>
      <button class="edit-close-btn" id="ep-close">\u2715</button>
    </div>
    <p style="font-size:11px;color:var(--text2);margin-bottom:10px">Nhấn vào loại phòng để thêm ngay:</p>
    <div class="room-palette">${paletteItems}</div>
    <button class="edit-btn secondary" id="ep-close2" style="width:100%">Hủy</button>`;
  infoPanel.classList.add('open');

  document.getElementById('ep-close').onclick = () => infoPanel.classList.remove('open');
  document.getElementById('ep-close2').onclick = () => infoPanel.classList.remove('open');

  infoPanel.querySelectorAll('.rp-card').forEach(card => {
    card.onclick = () => {
      const tplKey = card.dataset.tpl;
      const clickGx = parseInt(card.dataset.gx);
      const clickGy = parseInt(card.dataset.gy);
      addRoomFromTemplate(tplKey, clickGx, clickGy);
      infoPanel.classList.remove('open');
    };
  });
}

function addRoomFromTemplate(tplKey, preferGx, preferGy) {
  const tpl = ROOM_TEMPLATES[tplKey];
  if(!tpl) return;
  const floor = floors[currentFloor];
  // Try preferred position first (2x2), then find any empty space
  let gx=preferGx, gy=preferGy, gw=2, gh=2;
  if(!canPlaceRoom(floor, gx, gy, gw, gh, null)) {
    // Try 2x2 elsewhere
    const spot = findEmptySpace(floor, 2, 2);
    if(!spot) {
      // Try 3x2
      gw=3; gh=2;
      const spot2 = findEmptySpace(floor, 3, 2);
      if(!spot2) { showToast('info','Không đủ chỗ','Tầng đã đầy, thêm tầng mới'); return; }
      gx=spot2.gx; gy=spot2.gy;
    } else { gx=spot.gx; gy=spot.gy; }
  }
  // Auto-number: count existing rooms with same base name across all floors
  const baseName = tpl.name;
  const baseNameEn = tpl.nameEn;
  const existingCount = allRooms().filter(r => r.name.startsWith(baseName)).length;
  const num = existingCount + 1;
  const numberedName = `${baseName} ${num}`;
  const numberedNameEn = `${baseNameEn} ${num}`;

  const newRoom = {
    id:'room_'+Date.now(), name:numberedName, nameEn:numberedNameEn,
    color:tpl.color, colorLight:tpl.colorLight||shadeColor(tpl.color,40),
    gridX:gx, gridY:gy, gridW:gw, gridH:gh,
    status:'available', tags:[...tpl.tags], price:tpl.price,
    furniture:[...tpl.furniture], pets:[],
    furnitureItems:JSON.parse(JSON.stringify(tpl.furnitureItems))
  };
  floor.rooms.push(newRoom);
  showToast('info','Đã thêm',`${tpl.name} \u2192 Tầng ${floors[currentFloor].id}`);
  refreshAfterAction(newRoom);
}

const FLOOR_TEMPLATES = {

function createFloorFromTemplate(ftKey) {
  const ft = FLOOR_TEMPLATES[ftKey];
  if(!ft) return;
  const newId = floors.length + 1;
  const newFloor = {
    id:newId, name:`Tầng ${newId}`, nameEn:`Floor ${newId}`,
    description:ft.description, icon:ft.icon, tags:[...ft.tags], rooms:[]
  };
  // Track name counts for auto-numbering within this floor
  const nameCount = {};
  ft.rooms.forEach((r,i) => {
    const tpl = ROOM_TEMPLATES[r.tpl];
    const base = tpl || ROOM_TEMPLATES.empty;
    const baseName = r.name || base.name;
    const baseNameEn = r.nameEn || base.nameEn;
    nameCount[baseName] = (nameCount[baseName]||0) + 1;
    const count = nameCount[baseName];
    // Only number if there are duplicates (check total in template)
    const totalSame = ft.rooms.filter(x => (x.name||ROOM_TEMPLATES[x.tpl]?.name) === baseName).length;
    const displayName = totalSame > 1 ? `${baseName} ${count}` : baseName;
    const displayNameEn = totalSame > 1 ? `${baseNameEn} ${count}` : baseNameEn;
    newFloor.rooms.push({
      id:'room_'+Date.now()+'_'+i,
      name: displayName,
      nameEn: displayNameEn,
      color: base.color, colorLight: base.colorLight || shadeColor(base.color,40),
      gridX:r.gx, gridY:r.gy, gridW:r.gw, gridH:r.gh,
      status:'available', tags:[...(base.tags||[])], price:base.price||0,
      furniture:[...(base.furniture||[])], pets:[],
      furnitureItems: JSON.parse(JSON.stringify(base.furnitureItems||[]))
    });
  });
  floors.push(newFloor);
  currentFloor = floors.length-1;
  buildFloorSelector(); buildMinimap(); updateStats(); updateDashboard(); resize2D();
  showToast('info','Đã tạo tầng',`${ft.icon} ${ft.name}`);
}

function showBuildWizard() {
  let numFloors = 2;
  const ftKeys = Object.keys(FLOOR_TEMPLATES);
  const ftEntries = Object.entries(FLOOR_TEMPLATES);

  function render() {
    const floorRows = [];
    for(let i=0; i<numFloors; i++) {
      const defaultType = i===0 ? 'medical' : i===1 ? 'boarding' : i===2 ? 'surgery' : 'hotel';
      const options = ftEntries.map(([k,ft])=>`<option value="${k}" ${k===defaultType?'selected':''}>${ft.icon} ${ft.name}</option>`).join('');
      floorRows.push(`<div class="wiz-floor-row">
        <div class="wiz-floor-icon">${i===0?'\u{1F3E2}':i===1?'\u{1F3E8}':i===2?'\u2695\uFE0F':'\u{1F3E0}'}</div>
        <div class="wiz-floor-label">Tầng ${i+1}</div>
        <select class="wiz-floor-select" data-floor="${i}">${options}</select>
      </div>`);
    }

    const totalRooms = numFloors * 6;

    return `<div class="ft-modal" id="wiz-modal">
      <div class="ft-modal-content" style="width:460px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <h2 style="margin:0">\u{1F3D7}\uFE0F Xây dựng sơ đồ phòng khám</h2>
          <button class="edit-close-btn" id="wiz-close">\u2715</button>
        </div>
        <p style="font-size:11px;color:var(--text2);margin-bottom:16px">Tạo sơ đồ phòng khám thú y / pet hotel của bạn trong vài bước đơn giản.</p>

        <div class="wiz-step">
          <h3><span class="wiz-step-num">1</span> Phòng khám có bao nhiêu tầng?</h3>
          <div class="wiz-floor-count">
            <button id="wiz-minus">\u2212</button>
            <div class="wiz-num" id="wiz-num">${numFloors}</div>
            <button id="wiz-plus">+</button>
          </div>
        </div>

        <div class="wiz-step">
          <h3><span class="wiz-step-num">2</span> Mỗi tầng dùng cho mục đích gì?</h3>
          <div id="wiz-floors">${floorRows.join('')}</div>
        </div>

        <button class="wiz-generate" id="wiz-go">\u{1F680} Tạo sơ đồ (${numFloors} tầng \u00B7 ~${totalRooms} phòng)</button>
        <div class="wiz-preview">Bạn có thể chỉnh sửa, thêm/xóa phòng sau khi tạo</div>
      </div>
    </div>`;
  }

  // Insert modal
  const wrapper = document.createElement('div');
  wrapper.innerHTML = render();
  document.body.appendChild(wrapper.firstElementChild);

  function rebind() {
    const modal = document.getElementById('wiz-modal');
    if(!modal) return;
    modal.querySelector('#wiz-close').onclick = () => modal.remove();
    modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
    modal.querySelector('#wiz-minus').onclick = () => {
      if(numFloors>1) { numFloors--; rerender(); }
    };
    modal.querySelector('#wiz-plus').onclick = () => {
      if(numFloors<6) { numFloors++; rerender(); }
    };
    modal.querySelector('#wiz-go').onclick = () => {
      // Collect selections
      const selections = [];
      modal.querySelectorAll('.wiz-floor-select').forEach(sel => {
        selections.push(sel.value);
      });
      modal.remove();
      generateFullMap(selections);
    };
  }

  function rerender() {
    const old = document.getElementById('wiz-modal');
    if(old) old.remove();
    const w2 = document.createElement('div');
    w2.innerHTML = render();
    document.body.appendChild(w2.firstElementChild);
    rebind();
  }

  rebind();
}

function generateFullMap(floorSelections) {

    if(!ft) return;
    const newFloor = {
      id:i+1, name:`Tầng ${i+1}`, nameEn:`Floor ${i+1}`,
      description:ft.description, icon:ft.icon, tags:[...ft.tags], rooms:[]
    };
    const nameCount = {};
    ft.rooms.forEach((r,j) => {
      const tpl = ROOM_TEMPLATES[r.tpl];
      const base = tpl || ROOM_TEMPLATES.empty;
      const baseName = r.name || base.name;
      const baseNameEn = r.nameEn || base.nameEn;
      nameCount[baseName] = (nameCount[baseName]||0) + 1;
      const count = nameCount[baseName];
      const totalSame = ft.rooms.filter(x => (x.name||ROOM_TEMPLATES[x.tpl]?.name) === baseName).length;
      const displayName = totalSame > 1 ? `${baseName} ${count}` : baseName;
      const displayNameEn = totalSame > 1 ? `${baseNameEn} ${count}` : baseNameEn;
      newFloor.rooms.push({
        id:'room_'+Date.now()+'_'+i+'_'+j,
        name:displayName, nameEn:displayNameEn,
        color:base.color, colorLight:base.colorLight||shadeColor(base.color,40),
        gridX:r.gx, gridY:r.gy, gridW:r.gw, gridH:r.gh,
        status:'available', tags:[...(base.tags||[])], price:base.price||0,
        furniture:[...(base.furniture||[])], pets:[],

    floors.push(newFloor);

}

    description: 'Tầng mới', icon: '\u{1F3E2}', tags: [], rooms: []

function removeFloor() {
  if(floors.length<=1){ showToast('info','Không thể xóa','Cần ít nhất 1 tầng'); return; }
  const floor = floors[currentFloor];
  if(floor.rooms.length>0 && !confirm(`Xóa "${floor.name}" với ${floor.rooms.length} phòng?`)) return;
  floors.splice(currentFloor,1);
  floors.forEach((f,i)=>f.id=i+1);
  if(currentFloor>=floors.length) currentFloor=floors.length-1;
  buildFloorSelector(); buildMinimap(); updateStats(); updateDashboard();
  showToast('info','Đã xóa tầng',floor.name);
}

    }))
  }));

  showToast('info','Đã lưu','Sơ đồ đã lưu vào trình duyệt');

function loadFromLocalStorage() {
  const raw = localStorage.getItem('vetgo-floorplan');
  if(!raw) return false;
  try {
    const data = JSON.parse(raw);
    if(!Array.isArray(data)||data.length===0) return false;
    floors.length = 0;
    data.forEach(f => floors.push(f));
    return true;
  } catch(e) { console.error('Load failed:', e); return false; }
}

const petNames = ['Bông','Gấu','Mochi','Lucky','Bé','Sushi','Pudding','Caramel','Cookie','Tí'];
const petBreeds = {dog:['Corgi','Poodle','Shiba Inu','Pomeranian','Golden Retriever'],cat:['Persian','British Shorthair','Ragdoll','Bengal','Maine Coon'],exotic:['Iguana','Turtle','Hamster','Parrot']};
const ownerNames = ['Nguyễn Văn Hòa','Trần Thị Lan','Lê Quốc Bảo','Phạm Thu Hà','Hoàng Minh Đức','Đặng Thị Yến','Bùi Văn Tùng','Mai Thị Hương'];
const ownerPhones = ['0901111222','0912222333','0923333444','0934444555','0945555666','0956666777','0967777888','0978888999'];

function handleQuickAction(action, room, petIdx) {
  if (action === 'checkin') {
    const types = room.tags.filter(t=>['dog','cat','exotic'].includes(t));
    const type = types.length ? types[Math.floor(Math.random()*types.length)] : 'dog';
    const breeds = petBreeds[type] || petBreeds.dog;
    const today = new Date();
    const coDate = new Date(today); coDate.setDate(coDate.getDate() + Math.floor(Math.random()*5)+2);
    const newPet = {
      name: petNames[Math.floor(Math.random()*petNames.length)],
      breed: breeds[Math.floor(Math.random()*breeds.length)],
      checkin: today.toISOString().slice(0,10),
      checkout: coDate.toISOString().slice(0,10),
      type: type,
      owner: ownerNames[Math.floor(Math.random()*ownerNames.length)],
      phone: ownerPhones[Math.floor(Math.random()*ownerPhones.length)]
    };
    room.pets.push(newPet);
    room.status = 'occupied';
    showToast('checkin', `${newPet.name} đã check-in`, `${newPet.breed} \u2192 ${room.name} · ${formatVNDFull(room.price||0)}/đêm`);
    refreshAfterAction(room);
  }
  else if (action === 'checkout-single') {
    const idx = parseInt(petIdx);
    const pet = room.pets[idx];
    if (pet) {
      const days = Math.max(1, Math.floor((Date.now()-new Date(pet.checkin).getTime())/86400000));
      const bill = (room.price||0) * days;
      room.pets.splice(idx, 1);
      showToast('checkout', `${pet.name} đã check-out`, `${pet.breed} \u2190 ${room.name}${bill>0?' · Tổng: '+formatVNDFull(bill):''}`);
      if (room.pets.length === 0) {
        room.status = 'cleaning';
        showToast('cleaning', `${room.name} đang dọn dẹp`, 'Sẽ sẵn sàng trong giây lát...');
        setTimeout(() => {
          room.status = 'available';
          showToast('ready', `${room.name} đã sẵn sàng`, 'Phòng đã được dọn xong');
          refreshAfterAction(room);
        }, 5000);
      }
      refreshAfterAction(room);
    }
  }
  else if (action === 'checkout') {
    if (room.pets.length > 0) {
      const pet = room.pets.pop();
      showToast('checkout', `${pet.name} đã check-out`, `${pet.breed} \u2190 ${room.name}`);
      if (room.pets.length === 0) {
        room.status = 'cleaning';
        showToast('cleaning', `${room.name} đang dọn dẹp`, 'Sẽ sẵn sàng trong giây lát...');
        setTimeout(() => {
          room.status = 'available';
          showToast('ready', `${room.name} đã sẵn sàng`, 'Phòng đã được dọn xong');
          refreshAfterAction(room);
        }, 5000);
      }
      refreshAfterAction(room);
    }
  }
  else if (action === 'markready') {
    room.status = 'available';
    showToast('ready', `${room.name} đã sẵn sàng`, 'Phòng có thể nhận pet mới');
    refreshAfterAction(room);
  }
}

function refreshAfterAction(room) {
  showInfoPanel(room);
  updateStats();
  updateDashboard();
  buildFloorSelector();
  buildMinimap();
  drawAllMinimaps();
}

function showToast(type, title, detail) {
  const cfg = toastConfig[type] || toastConfig.info;
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.position = 'relative';
  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  el.innerHTML = `
    <div class="toast-accent" style="background:${cfg.color}"></div>
    <span class="toast-icon">${cfg.icon}</span>
    <div class="toast-body">
      <div class="toast-title">${title}</div>
      <div class="toast-detail">${detail}</div>
    </div>
    <span class="toast-time">${timeStr}</span>
  `;
  toastContainer.appendChild(el);

  // Auto remove after 4s
  setTimeout(() => {
    el.classList.add('leaving');
    setTimeout(() => el.remove(), 300);
  }, 4000);

  // Max 4 toasts
  while (toastContainer.children.length > 4) {
    toastContainer.firstChild.remove();
  }
}

let renderer,scene,camera,controls;
let threeInited=false;

function initThree(){
  if(threeInited)return;
  threeInited=true;
  const dpr=Math.min(window.devicePixelRatio,1.5);
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
  renderer.setPixelRatio(dpr);
  renderer.setSize(view3dEl.clientWidth,view3dEl.clientHeight);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.setClearColor(0x0f1117);
  view3dEl.appendChild(renderer.domElement);
  window.addEventListener('resize',()=>{
    if(currentView!=='3d')return;
    const w=view3dEl.clientWidth,h=view3dEl.clientHeight,a=w/h,d=4;
    camera.left=-d*a;camera.right=d*a;camera.top=d;camera.bottom=-d;
    camera.updateProjectionMatrix();renderer.setSize(w,h);
  });
}

function build3DRoom(room){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x0f1117);
  scene.fog=new THREE.Fog(0x0f1117,12,20);
  const w=view3dEl.clientWidth,h=view3dEl.clientHeight,a=w/h,d=4;
  camera=new THREE.OrthographicCamera(-d*a,d*a,d,-d,0.1,100);
  camera.position.set(5,5,5);camera.lookAt(0,0,0);

  controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;controls.dampingFactor=0.08;
  controls.maxPolarAngle=Math.PI/2.2;controls.minPolarAngle=0.3;
  controls.enablePan=true;controls.target.set(0,0,0);

  scene.add(new THREE.AmbientLight(0xffffff,0.5));
  const dir=new THREE.DirectionalLight(0xffffff,0.8);
  dir.position.set(5,8,3);dir.castShadow=true;dir.shadow.mapSize.set(1024,1024);
  scene.add(dir);
  const fill=new THREE.DirectionalLight(new THREE.Color(room.color),0.3);
  fill.position.set(-3,4,-2);scene.add(fill);

  const floorMat=new THREE.MeshStandardMaterial({color:new THREE.Color(room.color).multiplyScalar(0.3),roughness:0.8,metalness:0.1});
  const fl=new THREE.Mesh(new THREE.PlaneGeometry(4,3),floorMat);
  fl.rotation.x=-Math.PI/2;fl.receiveShadow=true;scene.add(fl);

  const gh=new THREE.GridHelper(4,8,0x333355,0x222244);gh.position.y=0.005;scene.add(gh);

  const wm=new THREE.MeshStandardMaterial({color:0x1a1d27,roughness:0.9,transparent:true,opacity:0.85,side:THREE.DoubleSide});
  const bw=new THREE.Mesh(new THREE.PlaneGeometry(4,2),wm);bw.position.set(0,1,-1.5);scene.add(bw);
  const lw=new THREE.Mesh(new THREE.PlaneGeometry(3,2),wm.clone());lw.position.set(-2,1,0);lw.rotation.y=Math.PI/2;scene.add(lw);

  const am=new THREE.MeshStandardMaterial({color:room.color,emissive:room.color,emissiveIntensity:0.3});
  const s1=new THREE.Mesh(new THREE.BoxGeometry(4,0.05,0.02),am);s1.position.set(0,0.03,-1.49);scene.add(s1);
  const s2=new THREE.Mesh(new THREE.BoxGeometry(0.02,0.05,3),am);s2.position.set(-1.99,0.03,0);scene.add(s2);

  createWallLabel(room.name);

  room.furnitureItems.forEach(item=>{
    let mesh;
    const mat=new THREE.MeshStandardMaterial({color:item.color,roughness:0.6,metalness:0.15});
    if(item.type==='box'){mesh=new THREE.Mesh(new THREE.BoxGeometry(item.w,item.h,item.d),mat);mesh.position.set(item.x,(item.posY||0)+item.h/2,item.z);}
    else if(item.type==='cylinder'){mesh=new THREE.Mesh(new THREE.CylinderGeometry(item.r,item.r,item.h,16),mat);mesh.position.set(item.x,(item.posY||0)+item.h/2,item.z);}
    else if(item.type==='kennel') mesh=createKennel(item,mat);
    else if(item.type==='catcondo') mesh=createCatCondo(item,mat);
    else if(item.type==='tub') mesh=createTub(item,mat);
    if(mesh){mesh.castShadow=true;mesh.receiveShadow=true;scene.add(mesh);}
  });
}

function createKennel(item,mat){
  const g=new THREE.Group();
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(item.w,0.05,item.d),mat),{position:new THREE.Vector3(0,0.025,0)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(item.w,item.h,0.04),mat),{position:new THREE.Vector3(0,item.h/2,-item.d/2)}));
  const sm=mat.clone();sm.transparent=true;sm.opacity=0.7;
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.04,item.h,item.d),sm),{position:new THREE.Vector3(-item.w/2,item.h/2,0)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.04,item.h,item.d),sm),{position:new THREE.Vector3(item.w/2,item.h/2,0)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(item.w,0.04,item.d),mat),{position:new THREE.Vector3(0,item.h,0)}));
  const bm=new THREE.MeshStandardMaterial({color:0x888888,metalness:0.8,roughness:0.2});
  for(let i=-3;i<=3;i++){const b=new THREE.Mesh(new THREE.CylinderGeometry(0.012,0.012,item.h,6),bm);b.position.set(i*0.1,item.h/2,item.d/2);g.add(b);}
  g.position.set(item.x,0,item.z);return g;
}

function createCatCondo(item,mat){
  const g=new THREE.Group(),levels=3;
  for(let i=0;i<levels;i++){
    const sh=new THREE.Mesh(new THREE.BoxGeometry(item.w,0.04,item.d),mat);sh.position.y=i*(item.h/levels);g.add(sh);
    if(i<levels-1){const o=new THREE.Mesh(new THREE.BoxGeometry(item.w-0.06,item.h/levels-0.06,item.d-0.06),new THREE.MeshStandardMaterial({color:0x111122,roughness:1}));o.position.y=i*(item.h/levels)+(item.h/levels)/2;g.add(o);}
  }
  const top=new THREE.Mesh(new THREE.BoxGeometry(item.w,0.04,item.d),mat);top.position.y=item.h;g.add(top);
  const pm=new THREE.MeshStandardMaterial({color:0x8B7355,roughness:0.9});
  [[-1,-1],[1,-1],[1,1],[-1,1]].forEach(([sx,sz])=>{const p=new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.025,item.h,8),pm);p.position.set(sx*(item.w/2-0.02),item.h/2,sz*(item.d/2-0.02));g.add(p);});
  g.position.set(item.x,0,item.z);return g;
}

function createTub(item,mat){
  const g=new THREE.Group();
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(item.w,item.h,item.d),mat),{position:new THREE.Vector3(0,item.h/2,0)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(item.w-0.1,item.h-0.05,item.d-0.1),new THREE.MeshStandardMaterial({color:0x4a90d9,roughness:0.3,metalness:0.1})),{position:new THREE.Vector3(0,item.h/2+0.05,0)}));
  const w=new THREE.Mesh(new THREE.PlaneGeometry(item.w-0.14,item.d-0.14),new THREE.MeshStandardMaterial({color:0x74b9ff,transparent:true,opacity:0.6,roughness:0.1,metalness:0.3}));
  w.rotation.x=-Math.PI/2;w.position.y=item.h*0.7;g.add(w);
  g.position.set(item.x,0,item.z);return g;
}

function createWallLabel(text){
  const c2=document.createElement('canvas');c2.width=512;c2.height=128;
  const c=c2.getContext('2d');
  c.fillStyle='rgba(0,0,0,0)';c.fillRect(0,0,512,128);
  c.fillStyle='#ffffff';c.font='bold 42px "Segoe UI",system-ui,sans-serif';c.textAlign='center';c.textBaseline='middle';
  c.fillText(text,256,64);
  const tex=new THREE.CanvasTexture(c2);
  const lm=new THREE.MeshBasicMaterial({map:tex,transparent:true});
  const label=new THREE.Mesh(new THREE.PlaneGeometry(2.5,0.6),lm);
  label.position.set(0,1.6,-1.48);scene.add(label);
}

function animate3D(){
  if(currentView!=='3d')return;
  controls.update();renderer.render(scene,camera);requestAnimationFrame(animate3D);
}

// ── Transitions ──
function transitionTo3D(room){
  currentView='3d';cancelAnimationFrame(animFrame2d);
  backBtn.style.display='inline-block';
  floorSelectorEl.classList.add('hidden');
  statsBar.classList.add('hidden');
  minimapEl.classList.add('hidden');
  filterBar.classList.add('hidden');
  dashboardEl.classList.add('hidden');

  overlay.style.opacity='1';
  setTimeout(()=>{
    canvas.style.display='none';view3dEl.style.display='block';
    initThree();renderer.setSize(view3dEl.clientWidth,view3dEl.clientHeight);
    build3DRoom(room);
    setTimeout(()=>{view3dEl.style.opacity='1';overlay.style.opacity='0';animate3D();},100);
  },300);
}

function backTo2D(){
  currentView='2d';backBtn.style.display='none';infoPanel.classList.remove('open');
  floorSelectorEl.classList.remove('hidden');statsBar.classList.remove('hidden');
  minimapEl.classList.remove('hidden');filterBar.classList.remove('hidden');
  dashboardEl.classList.remove('hidden');

  overlay.style.opacity='1';
  setTimeout(()=>{
    view3dEl.style.display='none';view3dEl.style.opacity='0';canvas.style.display='block';
    if(scene){scene.traverse(o=>{if(o.geometry)o.geometry.dispose();if(o.material){if(Array.isArray(o.material))o.material.forEach(m=>m.dispose());else o.material.dispose();}});}
    if(controls)controls.dispose();
    resize2D();draw2D();
    setTimeout(()=>{overlay.style.opacity='0';},100);
  },300);
}

// ── Keyboard ──
document.addEventListener('keydown',e=>{
  if(currentView!=='2d')return;
  if(e.key==='1')switchFloor(0);else if(e.key==='2')switchFloor(1);else if(e.key==='3')switchFloor(2);
  else if(e.key==='ArrowUp'&&currentFloor<floors.length-1)switchFloor(currentFloor+1);
  else if(e.key==='ArrowDown'&&currentFloor>0)switchFloor(currentFloor-1);
  else if(e.key==='/'||e.key==='f'&&e.ctrlKey){e.preventDefault();searchInput.focus();}
});

// ══════════════════════════════════
// ── REALTIME CLOCK ──
// ══════════════════════════════════
const clockEl = document.getElementById('clock');
function updateClock() {
  const now = new Date();
  const d = now.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});
  const t = now.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  clockEl.textContent = `${d} \u00B7 ${t}`;
}
updateClock();
setInterval(updateClock, 1000);

// ══════════════════════════════════
// ── DASHBOARD PANEL ──
// ══════════════════════════════════
const dashboardEl = document.getElementById('dashboard');
const donutCanvas = document.getElementById('donut-canvas');
const donutCtx = donutCanvas.getContext('2d');
const dashLegend = document.getElementById('dash-legend');
const dashAlerts = document.getElementById('dash-alerts');
const dashRevenue = document.getElementById('dash-revenue');
const dashBookings = document.getElementById('dash-bookings');
const donutTotal = document.getElementById('donut-total');

function updateDashboard() {
  const all = allRooms();
  const avail = all.filter(r=>r.status==='available').length;
  const occ = all.filter(r=>r.status==='occupied').length;
  const clean = all.filter(r=>r.status==='cleaning').length;
  const total = all.length;

  // Revenue data
  const rev = calcRevenue();
  const occPct = Math.round(rev.occupancyRate);

  // Donut center: show occupancy rate
  donutTotal.innerHTML = `${occPct}<span style="font-size:8px;display:block;color:var(--text2)">%</span>`;

  // Draw donut chart
  const cx=64, cy=64, r=26, lw=10;
  donutCtx.clearRect(0,0,128,128);
  const segments = [
    {val:avail, color:'#00b894', label:'Available'},
    {val:occ, color:'#e17055', label:'Occupied'},
    {val:clean, color:'#fdcb6e', label:'Cleaning'},
  ];
  let startAngle = -Math.PI/2;
  segments.forEach(seg => {
    if(seg.val === 0) return;
    const sweep = (seg.val/total) * Math.PI * 2;
    donutCtx.beginPath();
    donutCtx.arc(cx, cy, r, startAngle, startAngle + sweep);
    donutCtx.strokeStyle = seg.color;
    donutCtx.lineWidth = lw;
    donutCtx.lineCap = 'round';
    donutCtx.stroke();
    startAngle += sweep + 0.04;
  });

  // Legend
  dashLegend.innerHTML = segments.map(s =>
    `<div class="dash-legend-item"><div class="dash-legend-dot" style="background:${s.color}"></div>${s.val} ${s.label}</div>`
  ).join('') + `<div class="dash-legend-item" style="margin-top:2px"><div class="dash-legend-dot" style="background:var(--accent)"></div>Công suất ${occPct}%</div>`;

  // Revenue section
  const occColor = occPct >= 80 ? 'var(--red)' : occPct >= 50 ? 'var(--orange)' : 'var(--green)';
  dashRevenue.innerHTML = `
    <div class="revenue-grid">
      <div class="rev-card">
        <div class="rev-label">Doanh thu hôm nay</div>
        <div class="rev-value">${formatVND(rev.dailyRevenue)}</div>
      </div>
      <div class="rev-card">
        <div class="rev-label">Doanh thu tháng</div>
        <div class="rev-value orange">${formatVND(rev.monthlyRevenue)}</div>
      </div>
      <div class="rev-card">
        <div class="rev-label">Công suất phòng</div>
        <div class="rev-value blue">${rev.totalOccupied}/${rev.totalCapacity}</div>
      </div>
      <div class="rev-card">
        <div class="rev-label">Tỷ lệ lấp đầy</div>
        <div class="rev-value pink">${occPct}%</div>
      </div>
    </div>
    <div class="occupancy-bar-wrap">
      <div class="occupancy-bar-track">
        <div class="occupancy-bar-fill" style="width:${occPct}%;background:${occColor}"></div>
      </div>
    </div>`;

  // Upcoming checkouts
  let bookingsHtml = '';
  if(rev.upcomingCheckouts.length === 0) {
    bookingsHtml = '<div style="text-align:center;padding:8px;color:var(--text2);font-size:11px">\u2705 Không có checkout sắp tới</div>';
  } else {
    rev.upcomingCheckouts.forEach(b => {
      const emoji = b.type==='cat'?'\u{1F431}':b.type==='exotic'?'\u{1F98E}':'\u{1F436}';
      let dateClass = 'later', dateLabel = b.checkout;
      if(b.diffDays === 0) { dateClass='today'; dateLabel='Hôm nay'; }
      else if(b.diffDays === 1) { dateClass='tomorrow'; dateLabel='Ngày mai'; }
      else { dateLabel = b.diffDays + ' ngày nữa'; }
      bookingsHtml += `<div class="booking-item">
        <div class="booking-icon">${emoji}</div>
        <div class="booking-info">
          <div class="booking-name">${b.name} · ${b.breed || ''}</div>
          <div class="booking-detail">${b.room}${b.owner ? ' · '+b.owner : ''}</div>
        </div>
        <div class="booking-date ${dateClass}">${dateLabel}</div>
      </div>`;
    });
  }
  dashBookings.innerHTML = bookingsHtml;

  // Weekly revenue chart
  const weekly = getWeeklyRevenue();
  const maxVal = Math.max(...weekly.map(w=>w.value), 1);
  const dashWeekly = document.getElementById('dash-weekly-chart');
  let weekHtml = '<div style="font-size:8px;color:var(--text2);margin-top:6px">7 ngày gần nhất</div><div class="weekly-chart">';
  weekly.forEach(w => {
    const h = Math.max(2, (w.value / maxVal) * 38);
    const barColor = w.isToday ? 'var(--green)' : 'var(--accent)';
    weekHtml += `<div class="weekly-bar-wrap">
      <div class="weekly-bar-val">${formatVND(w.value)}</div>
      <div class="weekly-bar" style="height:${h}px;background:${barColor}"></div>
      <div class="weekly-bar-label"${w.isToday?' style="color:var(--green);font-weight:700"':''}>${w.label}</div>
    </div>`;
  });
  weekHtml += '</div>';
  dashWeekly.innerHTML = weekHtml;

  // Alerts
  let alertsHtml = '';
  all.forEach(rr => {
    const cap = getRoomCapacity(rr);
    if(cap > 0 && rr.pets.length >= cap) {
      alertsHtml += `<div class="dash-alert"><span class="da-icon">\u{1F534}</span><span class="da-text">${rr.name} <b>đầy</b></span><span class="da-badge" style="background:rgba(225,112,85,.15);color:var(--red)">${rr.pets.length}/${cap}</span></div>`;
    } else if(cap > 0 && rr.pets.length/cap >= 0.75) {
      alertsHtml += `<div class="dash-alert"><span class="da-icon">\u{1F7E0}</span><span class="da-text">${rr.name} gần đầy</span><span class="da-badge" style="background:rgba(253,203,110,.15);color:var(--orange)">${rr.pets.length}/${cap}</span></div>`;
    }
  });
  const pets = allPets();
  pets.forEach(p => {
    const days = Math.max(1, Math.floor((Date.now()-new Date(p.checkin).getTime())/86400000));
    if(days >= 3) {
      alertsHtml += `<div class="dash-alert"><span class="da-icon">\u{1F4C5}</span><span class="da-text">${p.name} - ${days} ngày</span><span class="da-badge" style="background:rgba(116,185,255,.15);color:var(--blue)">Review</span></div>`;
    }
  });
  if(!alertsHtml) alertsHtml = '<div class="dash-alert"><span class="da-icon">\u2705</span><span class="da-text">Không có cảnh báo</span></div>';
  dashAlerts.innerHTML = alertsHtml;
}

// Show/hide dashboard
function toggleDashboardVisibility(show) {
  dashboardEl.classList.toggle('hidden', !show);
}

// ── Init ──
backBtn.addEventListener('click',()=>backTo2D());
backBtn.addEventListener('touchend',e=>{e.preventDefault();backTo2D();});
window.addEventListener('resize',()=>{if(currentView==='2d')resize2D();});

// Redraw minimaps when filter changes
const origFilter = document.querySelectorAll('.filter-btn');
origFilter.forEach(b => b.addEventListener('click', () => setTimeout(()=>{drawAllMinimaps();updateDashboard();}, 50)));

// Try loading saved floor plan
loadFromLocalStorage();

buildFloorSelector();
buildMinimap();
updateStats();
updateDashboard();
toggleDashboardVisibility(true);
resize2D();
draw2D();

</script>
